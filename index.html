<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>ContaMaster 44 ✨ Versión Final</title>
    <style>
        :root { --fucsia: #D47088; --rosa: #FFF0F5; --rojo: #FF4D4D; --verde: #2E7D32; }
        /* Fuente aumentada de 16px a 18px */
        body { font-family: 'Segoe UI', sans-serif; background: #FFFFFF; margin: 0; padding: 20px; color: #333; font-size: 18px; }
        .container { max-width: 1100px; margin: auto; }
        
        #menu { display: block; text-align: center; }
        .tri-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(480px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { background: #FFF; border: 2px solid #EEE; border-radius: 20px; padding: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .titulo { color: var(--fucsia); font-weight: bold; text-align: left; border-left: 5px solid var(--fucsia); padding-left: 10px; margin-bottom: 15px; font-size: 1.2em; }
        
        .grid-btns { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; }
        .btn-j { background: #FFF; border: 1px solid #DDD; border-radius: 12px; padding: 10px 2px; cursor: pointer; transition: 0.2s; display: flex; flex-direction: column; align-items: center; }
        .btn-j:hover { background: var(--rosa); border-color: var(--fucsia); }
        .btn-j span { font-size: 1.6em; }
        .btn-j small { font-size: 0.7em; font-weight: bold; color: #777; margin-top: 3px; }

        #juego { display: none; background: #FFF; padding: 25px; border-radius: 25px; border: 3px solid var(--fucsia); box-shadow: 0 15px 40px rgba(0,0,0,0.1); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .btn-esc { background: var(--rojo); color: #FFF; border: none; padding: 12px 24px; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 18px; }
        
        .box { background: var(--rosa); padding: 20px; border-radius: 15px; margin-bottom: 20px; font-size: 1.3em; font-weight: bold; position: relative; }
        .hint-btn { position: absolute; top: 10px; right: 10px; font-size: 1.8em; cursor: pointer; background: none; border: none; }

        .row { display: grid; grid-template-columns: 110px 1fr 160px; gap: 10px; margin-bottom: 10px; width: 100%; max-width: 700px; margin: auto; }
        input { padding: 15px; border: 2px solid #DDD; border-radius: 10px; text-align: center; font-size: 18px; }
        input:focus { border-color: var(--fucsia); outline: none; }
        .cta-name { background: #F5F5F5; border: none; color: var(--fucsia); font-weight: bold; text-align: left; padding-left: 10px; font-size: 18px; }
        
        .btn-val { background: var(--fucsia); color: #FFF; width: 100%; max-width: 700px; padding: 20px; border-radius: 15px; font-size: 1.3em; border: none; font-weight: bold; cursor: pointer; display: block; margin: 20px auto; }
        #msg { margin-top: 15px; padding: 12px; border-radius: 10px; text-align: center; display: none; font-weight: bold; font-size: 18px; }
    </style>
</head>
<body>

<div class="container">
    <div id="menu">
        <h1 style="color: var(--fucsia); font-size: 2.5em;">🌸 CONTAMASTER 44</h1>
        <div class="tri-grid" id="render"></div>
    </div>

    <div id="juego">
        <div class="header">
            <button class="btn-esc" onclick="irMenu()">✖️ SALIR</button>
            <div id="game-title" style="font-weight:bold; color:var(--fucsia); font-size: 1.3em;">MODO</div>
            <div id="timer" style="font-weight:bold; font-size: 2em; color: var(--fucsia);">00:00</div>
        </div>
        <div class="box">
            <button class="hint-btn" onclick="verPista()">💡</button>
            <div id="quest"></div>
        </div>
        <div id="area">
            <div class="row">
                <input type="number" id="cd" placeholder="Código" onkeydown="enterCta(event, 'nd', 'id')">
                <input type="text" id="nd" class="cta-name" readonly placeholder="Cuenta...">
                <input type="number" id="id" placeholder="€ Debe">
            </div>
            <div style="text-align:center; font-weight:bold; color:var(--fucsia); margin:5px; font-size: 1.2em;">A</div>
            <div class="row">
                <input type="number" id="ch" placeholder="Código" onkeydown="enterCta(event, 'nh', 'ih')">
                <input type="text" id="nh" class="cta-name" readonly placeholder="Cuenta...">
                <input type="number" id="ih" placeholder="€ Haber">
            </div>
            <button class="btn-val" onclick="check()">🚀 VALIDAR</button>
        </div>
        <div id="msg"></div>
    </div>
</div>

<script>
    const PGC = { 100:"Capital Social", 129:"Rtdo. Ejercicio", 210:"Terrenos", 216:"Mobiliario", 217:"Equipos Info", 300:"Mercaderías", 400:"Proveedores", 430:"Clientes", 472:"IVA Sop.", 477:"IVA Rep.", 572:"Bancos", 600:"Compras", 700:"Ventas", 628:"Suministros", 640:"Sueldos" };

    const MODOS = [
        { i: "⚖️", t: "Balance de Pesas", p: "Suma Debe = Suma Haber." },
        { i: "🎯", t: "Tiro al Error", p: "Revisa si el código es del grupo correcto." },
        { i: "🏃", t: "Salto del PGC", p: "Grupo 2 es Inmovilizado." },
        { i: "🔢", t: "Cero Izquierda", p: "Base x 0.21 = IVA." },
        { i: "🧩", t: "Memoria Activa", p: "472 es Soportado." },
        { i: "🕳️", t: "Fuga Capital", p: "No olvides los gastos bancarios." },
        { i: "🖼️", t: "Puzle Factura", p: "Total = Base + Cuota." },
        { i: "⚡", t: "Auditor Veloz", p: "Activo=Bienes, Pasivo=Deudas." },
        { i: "🪜", t: "Escalera Cierre", p: "Regulariza antes de cerrar." },
        { i: "🔍", t: "Sopa Cuentas", p: "Busca 'Bancos'." },
        { i: "🏆", t: "Examen Final", p: "Repasa todo el trimestre." }
    ];

    let db = [];
    for(let t=1; t<=4; t++) {
        MODOS.forEach((m, i) => {
            db.push({
                titulo: m.t,
                icono: m.i,
                pista: m.p,
                enunciado: `[T${t} - Juego ${i+1}] Realiza el asiento: Operación de ${100*(i+1)}€ + 21% IVA por banco.`,
                cd: 600, ch: 572, id: 100*(i+1), ih: (100*(i+1))*1.21
            });
        });
    }

    let crono, seg = 0, ejActual = null;

    function renderMenu() {
        const r = document.getElementById('render');
        r.innerHTML = "";
        for(let t=0; t<4; t++) {
            let h = `<div class="card"><span class="titulo">${t+1}º TRIMESTRE</span><div class="grid-btns">`;
            for(let j=0; j<11; j++) {
                let idx = (t*11)+j;
                h += `<button class="btn-j" onclick="play(${idx})"><span>${db[idx].icono}</span><small>${db[idx].titulo}</small></button>`;
            }
            h += `</div></div>`;
            r.innerHTML += h;
        }
    }

    function play(idx) {
        ejActual = db[idx];
        document.getElementById('menu').style.display = 'none';
        document.getElementById('juego').style.display = 'block';
        document.getElementById('game-title').innerText = ejActual.titulo;
        document.getElementById('quest').innerText = ejActual.enunciado;
        document.getElementById('msg').style.display = 'none';
        clearInp();
        startT();
    }

    function enterCta(e, label, next) {
        if (e.key === 'Enter') {
            const v = e.target.value;
            if (PGC[v]) {
                document.getElementById(label).value = PGC[v];
                document.getElementById(next).focus();
            }
        }
    }

    function check() {
        const m = document.getElementById('msg');
        const cd = parseInt(document.getElementById('cd').value);
        const ch = parseInt(document.getElementById('ch').value);
        const id = parseFloat(document.getElementById('id').value);
        const ih = parseFloat(document.getElementById('ih').value);

        if(cd === ejActual.cd && ch === ejActual.ch && id === ejActual.id && ih === ejActual.ih) {
            m.innerText = "⭐ ¡CORRECTO! Dominas el " + ejActual.titulo;
            m.style.background = "#E8F5E9"; m.style.color = "#2E7D32";
        } else {
            m.innerText = "❌ ERROR: Revisa cuentas o importes.";
            m.style.background = "#FFEBEE"; m.style.color = "#C62828";
        }
        m.style.display = "block";
    }

    function irMenu() { clearInterval(crono); document.getElementById('menu').style.display = 'block'; document.getElementById('juego').style.display = 'none'; }
    function verPista() { alert("💡 PISTA: " + ejActual.pista); }
    function startT() { seg = 0; clearInterval(crono); crono = setInterval(() => { seg++; let min = Math.floor(seg/60), s = seg%60; document.getElementById('timer').innerText = `${min.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`; }, 1000); }
    function clearInp() { document.querySelectorAll('input').forEach(i => i.value = ""); document.getElementById('nd').value=""; document.getElementById('nh').value=""; }

    renderMenu();
</script>
</body>
</html>
