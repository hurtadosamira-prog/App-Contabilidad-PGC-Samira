<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>✨ ContaMaster ✨</title>
    <style>
        :root { --fucsia: #D47088; --rosa: #FFF0F5; --rojo: #FF4D4D; --verde: #2E7D32; }
        body { font-family: 'Segoe UI', sans-serif; background: #F5F5F5; margin: 0; padding: 40px; color: #333; font-size: 20px; }
        .container { max-width: 1400px; margin: auto; }
        #menu { display: block; text-align: center; }
        .tri-selector { display: grid; grid-template-columns: repeat(2, 1fr); gap: 40px; margin-top: 50px; }
        .btn-trimestre { background: #FFF; border: 4px solid var(--fucsia); border-radius: 40px; padding: 80px 20px; font-size: 2.5em; font-weight: bold; color: var(--fucsia); cursor: pointer; transition: 0.3s; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .btn-trimestre:hover { background: var(--fucsia); color: #FFF; transform: translateY(-10px); }
        #vista-juegos { display: none; }
        .card { background: #FFF; border: 3px solid #EEE; border-radius: 30px; padding: 25px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); margin-top: 20px; }
        .titulo-seccion { color: var(--fucsia); font-weight: bold; text-align: left; border-left: 8px solid var(--fucsia); padding-left: 15px; margin-bottom: 25px; font-size: 1.8em; display: flex; justify-content: space-between; align-items: center; }
        .grid-btns { display: grid; grid-template-columns: repeat(6, 1fr); gap: 15px; }
        .btn-j { background: #FFF; border: 2px solid #DDD; border-radius: 18px; padding: 25px 5px; cursor: pointer; transition: 0.2s; display: flex; flex-direction: column; align-items: center; }
        .btn-j:hover { background: var(--rosa); border-color: var(--fucsia); transform: scale(1.05); }
        .btn-j span { font-size: 2.5em; }
        .btn-j small { font-size: 0.8em; font-weight: bold; color: #777; margin-top: 10px; }
        #pantalla-juego { display: none; background: #FFF; padding: 40px; border-radius: 40px; border: 5px solid var(--fucsia); box-shadow: 0 25px 60px rgba(0,0,0,0.1); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .btn-esc { background: var(--rojo); color: #FFF; border: none; padding: 15px 35px; border-radius: 15px; font-weight: bold; cursor: pointer; font-size: 20px; }
        .box { background: var(--rosa); padding: 30px; border-radius: 25px; margin-bottom: 30px; font-size: 1.5em; font-weight: bold; position: relative; }
        .hint-btn { position: absolute; top: 15px; right: 20px; font-size: 2em; cursor: pointer; background: none; border: none; }
        .row { display: grid; grid-template-columns: 140px 1fr 200px; gap: 20px; margin-bottom: 15px; width: 100%; max-width: 900px; margin: auto; }
        input { padding: 20px; border: 3px solid #DDD; border-radius: 15px; text-align: center; font-size: 22px; width: 100%; box-sizing: border-box; }
        .cta-name { background: #F5F5F5; border: none; color: var(--fucsia); font-weight: bold; text-align: left; padding-left: 20px; font-size: 22px; }
        .btn-val { background: var(--fucsia); color: #FFF; width: 100%; max-width: 900px; padding: 25px; border-radius: 20px; font-size: 1.6em; border: none; font-weight: bold; cursor: pointer; display: block; margin: 40px auto; }
        #msg { margin-top: 25px; padding: 20px; border-radius: 20px; text-align: center; display: none; font-weight: bold; font-size: 22px; }
        .btn-check { background: var(--fucsia); color: white; border: none; padding: 12px 24px; border-radius: 10px; cursor: pointer; margin: 10px 5px; font-weight: bold; font-size: 18px; }
    </style>
</head>
<body>

<div class="container">
    <div id="menu">
        <h1 style="color: var(--fucsia); font-size: 3.5em; margin-bottom: 10px;">✨ ContaMaster ✨</h1>
        <div id="selector-trimestres" class="tri-selector">
            <button class="btn-trimestre" onclick="abrirTrimestre(0)">1º TRIMESTRE</button>
            <button class="btn-trimestre" onclick="abrirTrimestre(1)">2º TRIMESTRE</button>
            <button class="btn-trimestre" onclick="abrirTrimestre(2)">3º TRIMESTRE</button>
            <button class="btn-trimestre" onclick="abrirTrimestre(3)">4º TRIMESTRE</button>
        </div>
        <div id="vista-juegos">
            <div class="card">
                <div class="titulo-seccion">
                    <span id="txt-trimestre">TRIMESTRE</span>
                    <button class="btn-esc" style="background: #999;" onclick="volverAInicio()">ATRÁS</button>
                </div>
                <div class="grid-btns" id="render-botones"></div>
            </div>
        </div>
    </div>

    <div id="pantalla-juego">
        <div class="header">
            <button class="btn-esc" onclick="cerrarJuego()">✖️ SALIR</button>
            <div id="game-title" style="font-weight:bold; color:var(--fucsia); font-size: 1.6em;">MODO</div>
            <div id="timer" style="font-weight:bold; font-size: 2.5em; color: var(--fucsia);">00:00</div>
        </div>
        <div class="box">
            <button class="hint-btn" onclick="verPista()">💡</button>
            <div id="quest"></div>
        </div>
        <div id="area">
            <div class="row">
                <input type="number" id="cd" placeholder="Código" oninput="updateName(this, 'nd')" onkeydown="if(e.key==='Enter') document.getElementById('id').focus()">
                <input type="text" id="nd" class="cta-name" readonly placeholder="Cuenta...">
                <input type="number" id="id" placeholder="€ Debe">
            </div>
            <div style="text-align:center; font-weight:bold; color:var(--fucsia); margin:15px; font-size: 1.5em;">A</div>
            <div class="row">
                <input type="number" id="ch" placeholder="Código" oninput="updateName(this, 'nh')" onkeydown="if(e.key==='Enter') document.getElementById('ih').focus()">
                <input type="text" id="nh" class="cta-name" readonly placeholder="Cuenta...">
                <input type="number" id="ih" placeholder="€ Haber">
            </div>
            <button class="btn-val" onclick="check()">🚀 VALIDAR</button>
        </div>
        <div id="msg"></div>
    </div>
</div>

<div id="game-overlay" style="display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; color: white;">
    <div style="background: white; color: #333; padding: 25px; border-radius: 15px; width: 90%; max-width: 500px; text-align: center;">
        <h2 id="mini-g-title" style="color: var(--fucsia)"></h2>
        <div id="mini-g-content" style="font-size: 1.2em; margin-bottom: 15px;"></div>
        <div id="mini-feedback" style="margin: 15px 0; font-weight: bold; min-height: 25px;"></div>
        <button onclick="document.getElementById('game-overlay').style.display='none'" style="background: #e74c3c; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer;">CERRAR</button>
    </div>
</div>

<script>
    const PGC = { 100:"Capital Social", 129:"Rtdo. Ejercicio", 210:"Terrenos", 216:"Mobiliario", 217:"Equipos Info", 300:"Mercaderías", 400:"Proveedores", 430:"Clientes", 472:"IVA Sop.", 477:"IVA Rep.", 572:"Bancos", 600:"Compras", 700:"Ventas", 628:"Suministros", 640:"Sueldos" };

    const MODOS = [
        { modeId: "balance", i: "⚖️", t: "Balance Pesas", p: "Suma Debe = Suma Haber." },
        { modeId: "pgc", i: "🎯", t: "Tiro al Error", p: "Encuentra el código correcto." },
        { modeId: "salto", i: "🏃", t: "Salto PGC", p: "Identifica el grupo correcto." },
        { modeId: "iva", i: "🔢", t: "Cero Izq.", p: "Calcula el IVA (21%)." },
        { modeId: "memoria", i: "🧩", t: "Memoria Act.", p: "Clasifica Activo o Pasivo." },
        { modeId: "fuga", i: "🕳️", t: "Fuga Capital", p: "Encuentra el importe que falta." },
        { modeId: "puzle", i: "🖼️", t: "Puzle Fact.", p: "Base + IVA = Total." },
        { modeId: "auditor", i: "⚡", t: "Auditor Veloz", p: "Verdadero o Falso." },
        { modeId: "escalera", i: "🪜", t: "Escalera", p: "Diferencia Gasto de Ingreso." },
        { modeId: "sopa", i: "🔍", t: "Sopa Cuentas", p: "Traduce nombre a código." },
        { modeId: "examen", i: "🏆", t: "Examen Final", p: "Asiento completo aleatorio." }
    ];

    let crono, seg = 0, ejActual = null, triActualIdx = 0;
    let currentMiniAnswer = "";

    function abrirTrimestre(tIdx) {
        triActualIdx = tIdx;
        document.getElementById('selector-trimestres').style.display = 'none';
        document.getElementById('vista-juegos').style.display = 'block';
        document.getElementById('txt-trimestre').innerText = (tIdx + 1) + "º TRIMESTRE";
        const r = document.getElementById('render-botones');
        r.innerHTML = "";
        MODOS.forEach((m, idx) => {
            r.innerHTML += `<button class="btn-j" onclick="lanzarJuego('${m.modeId}', '${m.t}', '${m.p}')"><span>${m.i}</span><small>${m.t}</small></button>`;
        });
    }

    function lanzarJuego(modeId, titulo, pista) {
        if(modeId === 'examen') {
            generarAsientoAleatorio(titulo, pista);
        } else {
            launchMini(modeId);
        }
    }

    function launchMini(gameId) {
        const overlay = document.getElementById('game-overlay');
        const content = document.getElementById('mini-g-content');
        const feedback = document.getElementById('mini-feedback');
        const title = document.getElementById('mini-g-title');
        overlay.style.display = 'flex';
        feedback.innerText = "";
        const rVal = () => Math.floor(Math.random() * 5000) + 100;
        const keys = Object.keys(PGC);

        switch(gameId) {
            case 'balance':
                title.innerText = "⚖️ Balance de Pesas";
                let v1 = rVal(), v2 = rVal(); currentMiniAnswer = v1 + v2;
                content.innerHTML = `<p>Debe 1: ${v1}€ | Debe 2: ${v2}€</p><p>¿Total en el Haber?</p><input type="number" id="mini-ans"><button class="btn-check" onclick="checkMini(document.getElementById('mini-ans').value)">CUADRAR</button>`;
                break;
            case 'iva':
                title.innerText = "🔢 Cero a la Izquierda";
                let base = (Math.floor(Math.random()*20)+1)*100; currentMiniAnswer = (base * 0.21).toFixed(0);
                content.innerHTML = `<p>Base: ${base}€</p><p>¿IVA (21%) aproximado?</p><input type="number" id="mini-ans"><button class="btn-check" onclick="checkMini(document.getElementById('mini-ans').value)">CALCULAR</button>`;
                break;
            case 'pgc':
                title.innerText = "🎯 Tiro al Error";
                let correctK = keys[Math.floor(Math.random()*keys.length)]; currentMiniAnswer = correctK;
                content.innerHTML = `<p>Código de: <b>${PGC[correctK]}</b>?</p><input type="number" id="mini-ans"><button class="btn-check" onclick="checkMini(document.getElementById('mini-ans').value)">DISPARAR</button>`;
                break;
            case 'auditor':
                title.innerText = "⚡ Auditor Veloz";
                let q = Math.random() > 0.5 ? {q:"La 572 es Activo", a:"V"} : {q:"La 400 es Activo", a:"F"}; currentMiniAnswer = q.a;
                content.innerHTML = `<p>${q.q}</p><button class="btn-check" onclick="checkMini('V')">V</button><button class="btn-check" onclick="checkMini('F')">F</button>`;
                break;
            default:
                let kRandom = keys[Math.floor(Math.random()*keys.length)]; currentMiniAnswer = kRandom;
                content.innerHTML = `<p>Busca el código de: <b>${PGC[kRandom]}</b></p><input type="number" id="mini-ans"><button class="btn-check" onclick="checkMini(document.getElementById('mini-ans').value)">LISTO</button>`;
        }
    }

    function checkMini(val) {
        const fb = document.getElementById('mini-feedback');
        if (val == currentMiniAnswer) {
            fb.innerHTML = "<span style='color:green'>¡CORRECTO! 🌟</span>";
            setTimeout(() => { document.getElementById('game-overlay').style.display = 'none'; }, 600);
        } else fb.innerHTML = "<span style='color:red'>Error</span>";
    }

    function generarAsientoAleatorio(titulo, pistaDefault) {
        const tipos = [
            { e: "Compra mercaderías", cd: 600, ch: 572, p: "Gasto (6) contra Banco (572)" },
            { e: "Venta mercaderías", cd: 572, ch: 700, p: "Banco (572) contra Ingreso (7)" },
            { e: "Pago de luz", cd: 628, ch: 572, p: "Suministros (6) contra Banco (572)" }
        ];
        let sel = tipos[Math.floor(Math.random() * tipos.length)];
        let monto = (Math.floor(Math.random() * 50) + 1) * 100;
        ejActual = { titulo: titulo, enunciado: `${sel.e} por ${monto}€.`, cd: sel.cd, ch: sel.ch, id_val: monto, ih_val: monto, pista: sel.p };
        document.getElementById('menu').style.display = 'none';
        document.getElementById('pantalla-juego').style.display = 'block';
        document.getElementById('quest').innerText = ejActual.enunciado;
        document.getElementById('msg').style.display = 'none';
        clearInp(); startT();
    }

    function check() {
        const m = document.getElementById('msg');
        const cd = parseInt(document.getElementById('cd').value);
        const ch = parseInt(document.getElementById('ch').value);
        const valD = parseFloat(document.getElementById('id').value);
        const valH = parseFloat(document.getElementById('ih').value);
        if(cd === ejActual.cd && ch === ejActual.ch && valD === ejActual.id_val && valH === ejActual.ih_val) {
            m.innerText = "⭐ ¡CORRECTO!"; m.style.background = "#E8F5E9"; m.style.color = "#2E7D32";
        } else {
            m.innerText = "❌ ERROR: Revisa los datos."; m.style.background = "#FFEBEE"; m.style.color = "#C62828";
        }
        m.style.display = "block";
    }

    function updateName(el, targetId) { document.getElementById(targetId).value = PGC[el.value] || ""; }
    function volverAInicio() { document.getElementById('selector-trimestres').style.display = 'grid'; document.getElementById('vista-juegos').style.display = 'none'; }
    function cerrarJuego() { clearInterval(crono); document.getElementById('menu').style.display = 'block'; document.getElementById('pantalla-juego').style.display = 'none'; }
    function verPista() { alert("💡 PISTA: " + ejActual.pista); }
    function startT() { seg = 0; clearInterval(crono); crono = setInterval(() => { seg++; let min = Math.floor(seg/60), s = seg%60; document.getElementById('timer').innerText = `${min.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`; }, 1000); }
    function clearInp() { document.querySelectorAll('#pantalla-juego input').forEach(i => i.value = ""); }
</script>
</body>
</html>
