<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>✨ ContaMaster Pro ✨</title>
    <style>
        :root { --fucsia: #D47088; --rosa: #FFF0F5; --rojo: #FF4D4D; --verde: #2E7D32; }
        body { font-family: 'Segoe UI', sans-serif; background: #F5F5F5; margin: 0; padding: 40px; color: #333; font-size: 20px; }
        .container { max-width: 1400px; margin: auto; }
        #menu { text-align: center; }
        .tri-selector { display: grid; grid-template-columns: repeat(2, 1fr); gap: 40px; margin-top: 50px; }
        .btn-trimestre { background: #FFF; border: 4px solid var(--fucsia); border-radius: 40px; padding: 80px 20px; font-size: 2.5em; font-weight: bold; color: var(--fucsia); cursor: pointer; transition: 0.3s; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .btn-trimestre:hover { background: var(--fucsia); color: #FFF; transform: translateY(-10px); }
        #vista-juegos, #pantalla-juego, #game-overlay { display: none; }
        .card { background: #FFF; border: 3px solid #EEE; border-radius: 30px; padding: 25px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); margin-top: 20px; }
        .titulo-seccion { color: var(--fucsia); font-weight: bold; text-align: left; border-left: 8px solid var(--fucsia); padding-left: 15px; margin-bottom: 25px; font-size: 1.8em; display: flex; justify-content: space-between; align-items: center; }
        .grid-btns { display: grid; grid-template-columns: repeat(6, 1fr); gap: 15px; }
        .btn-j { background: #FFF; border: 2px solid #DDD; border-radius: 18px; padding: 25px 5px; cursor: pointer; transition: 0.2s; display: flex; flex-direction: column; align-items: center; }
        .btn-j:hover { background: var(--rosa); border-color: var(--fucsia); transform: scale(1.05); }
        .btn-j span { font-size: 2.5em; }
        #pantalla-juego { background: #FFF; padding: 40px; border-radius: 40px; border: 5px solid var(--fucsia); box-shadow: 0 25px 60px rgba(0,0,0,0.1); }
        .box { background: var(--rosa); padding: 30px; border-radius: 25px; margin-bottom: 30px; font-size: 1.5em; font-weight: bold; }
        .row { display: grid; grid-template-columns: 140px 1fr 200px; gap: 20px; margin-bottom: 15px; width: 100%; max-width: 900px; margin: auto; }
        input { padding: 20px; border: 3px solid #DDD; border-radius: 15px; text-align: center; font-size: 22px; width: 100%; box-sizing: border-box; }
        .btn-val { background: var(--fucsia); color: #FFF; width: 100%; max-width: 900px; padding: 25px; border-radius: 20px; font-size: 1.6em; border: none; font-weight: bold; cursor: pointer; display: block; margin: 40px auto; }
        #game-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; }
        .mini-card { background: white; color: #333; padding: 30px; border-radius: 20px; width: 90%; max-width: 500px; text-align: center; }
        .btn-mini { background: var(--fucsia); color: white; border: none; padding: 12px 25px; border-radius: 10px; cursor: pointer; margin: 5px; font-weight: bold; font-size: 18px; }
    </style>
</head>
<body>

<div class="container">
    <div id="menu">
        <h1 style="color: var(--fucsia); font-size: 3.5em;">✨ ContaMaster ✨</h1>
        <div id="selector-trimestres" class="tri-selector">
            <button class="btn-trimestre" onclick="abrirTrimestre(1)">1º TRIMESTRE</button>
            <button class="btn-trimestre" onclick="abrirTrimestre(2)">2º TRIMESTRE</button>
            <button class="btn-trimestre" onclick="abrirTrimestre(3)">3º TRIMESTRE</button>
            <button class="btn-trimestre" onclick="abrirTrimestre(4)">4º TRIMESTRE</button>
        </div>
        <div id="vista-juegos">
            <div class="card">
                <div class="titulo-seccion"><span id="txt-trimestre">TRIMESTRE</span><button class="btn-mini" style="background:#999" onclick="location.reload()">VOLVER</button></div>
                <div class="grid-btns" id="render-botones"></div>
            </div>
        </div>
    </div>

    <div id="pantalla-juego">
        <div style="text-align:right"><button class="btn-mini" style="background:var(--rojo)" onclick="cerrarAsiento()">✖️ SALIR</button></div>
        <div class="box" id="quest"></div>
        <div class="row">
            <input type="number" id="cd" placeholder="Cód."><input type="text" id="nd" readonly placeholder="Cuenta..."><input type="number" id="id" placeholder="€ Debe">
        </div>
        <div style="text-align:center; color:var(--fucsia); font-weight:bold; margin:10px;">A</div>
        <div class="row">
            <input type="number" id="ch" placeholder="Cód."><input type="text" id="nh" readonly placeholder="Cuenta..."><input type="number" id="ih" placeholder="€ Haber">
        </div>
        <button class="btn-val" onclick="validarAsiento()">🚀 VALIDAR ASIENTO</button>
    </div>
</div>

<div id="game-overlay"><div class="mini-card" id="mini-cont"></div></div>

<script>
    const PGC = { 100:"Capital Social", 129:"Rtdo. Ejercicio", 210:"Terrenos", 216:"Mobiliario", 217:"Equipos Info", 300:"Mercaderías", 400:"Proveedores", 430:"Clientes", 472:"IVA Sop.", 477:"IVA Rep.", 572:"Bancos", 600:"Compras", 700:"Ventas", 628:"Suministros", 640:"Sueldos" };
    const MODOS = [
        { id:"balance", i:"⚖️", t:"Pesas" }, { id:"iva", i:"🔢", t:"IVA" }, { id:"pgc", i:"🎯", t:"Cód." },
        { id:"salto", i:"🏃", t:"Grupos" }, { id:"memoria", i:"🧩", t:"Act/Pas" }, { id:"fuga", i:"🕳️", t:"Fugas" },
        { id:"puzle", i:"🖼️", t:"Factura" }, { id:"auditor", i:"⚡", t:"V/F" }, { id:"escalera", i:"🪜", t:"G/I" },
        { id:"sopa", i:"🔍", t:"Busca" }, { id:"examen", i:"🏆", t:"EXAMEN" }
    ];

    let triActual = 1, solActual = "", asntSol = {};

    function abrirTrimestre(t) {
        triActual = t;
        document.getElementById('selector-trimestres').style.display = 'none';
        document.getElementById('vista-juegos').style.display = 'block';
        document.getElementById('txt-trimestre').innerText = t + "º TRIMESTRE";
        const r = document.getElementById('render-botones');
        r.innerHTML = "";
        MODOS.forEach(m => r.innerHTML += `<button class="btn-j" onclick="jugar('${m.id}')"><span>${m.i}</span><small>${m.t}</small></button>`);
    }

    function jugar(id) {
        if(id === 'examen') { iniciarAsiento(); return; }
        const ov = document.getElementById('game-overlay');
        const cont = document.getElementById('mini-cont');
        ov.style.display = 'flex';
        
        const r = (n) => Math.floor(Math.random() * n) + 1;
        const keys = Object.keys(PGC);

        let html = `<h3>${id.toUpperCase()}</h3>`;
        
        if(id === 'balance') {
            let d = r(20)*100, h = r(10)*100; solActual = d - h;
            html += `<p>Debe: ${d}€ | Haber: ${h}€</p><p>¿Cuanto falta en el Haber?</p>`;
        } else if(id === 'iva') {
            let b = r(50)*10; solActual = (b * 0.21).toFixed(2);
            html += `<p>Base: ${b}€</p><p>¿IVA (21%)? (Usa 2 decimales)</p>`;
        } else if(id === 'pgc' || id === 'sopa') {
            let c = keys[Math.floor(Math.random()*keys.length)]; solActual = c;
            html += `<p>¿Código de: <b>${PGC[c]}</b>?</p>`;
        } else if(id === 'salto') {
            let c = keys[Math.floor(Math.random()*keys.length)]; solActual = c[0];
            html += `<p>¿A qué grupo (1-7) pertenece <b>${PGC[c]}</b>?</p>`;
        } else if(id === 'memoria') {
            let m = r(2) > 1 ? {n:"Bancos",s:"A"} : {n:"Proveedores",s:"P"}; solActual = m.s;
            html += `<p><b>${m.n}</b> es...</p><button class="btn-mini" onclick="checkM('A')">ACTIVO</button><button class="btn-mini" onclick="checkM('P')">PASIVO</button>`;
        } else if(id === 'fuga') {
            let f = r(50)*20; solActual = f;
            html += `<p>Asiento descuadrado por ${f}€. ¿Qué importe debes añadir?</p>`;
        } else if(id === 'puzle') {
            let b = r(100)*10; solActual = (b * 1.21).toFixed(2);
            html += `<p>Base: ${b}€ | IVA: 21%. ¿Total Factura?</p>`;
        } else if(id === 'auditor') {
            let q = r(2)>1 ? {t:"La 572 es Activo",a:"V"} : {t:"La 400 es Activo",a:"F"}; solActual = q.a;
            html += `<p>${q.t}</p><button class="btn-mini" onclick="checkM('V')">V</button><button class="btn-mini" onclick="checkM('F')">F</button>`;
        } else if(id === 'escalera') {
            let q = r(2)>1 ? {t:"600 Compras",a:"G"} : {t:"700 Ventas",a:"I"}; solActual = q.a;
            html += `<p><b>${q.t}</b> es...</p><button class="btn-mini" onclick="checkM('G')">GASTO</button><button class="btn-mini" onclick="checkM('I')">INGRESO</button>`;
        }

        if(!html.includes('button')) html += `<input type="number" step="0.01" id="ans"><br><button class="btn-mini" onclick="checkM(document.getElementById('ans').value)">ENVIAR</button>`;
        cont.innerHTML = html + `<br><button onclick="document.getElementById('game-overlay').style.display='none'" style="background:#999; color:white; border:none; padding:5px; margin-top:10px; cursor:pointer">Cerrar</button>`;
    }

    function checkM(v) {
        if(v == solActual) { alert("✅ ¡CORRECTO!"); document.getElementById('game-overlay').style.display='none'; }
        else alert("❌ Error. Inténtalo de nuevo.");
    }

    function iniciarAsiento() {
        const ops = [
            {e:"Compra mercaderías por", cd:600, ch:572, txt:"al contado"},
            {e:"Venta mercaderías por", cd:572, ch:700, txt:"cobrando por banco"},
            {e:"Pago de luz por", cd:628, ch:572, txt:"por banco"},
            {e:"Socios aportan capital por", cd:572, ch:100, txt:"en cuenta corriente"}
        ];
        let o = ops[Math.floor(Math.random()*ops.length)];
        let v = Math.floor(Math.random()*2000)+100;
        asntSol = { ...o, v: v };
        document.getElementById('menu').style.display='none';
        document.getElementById('pantalla-juego').style.display='block';
        document.getElementById('quest').innerText = `${o.e} ${v}€ ${o.txt}. (Sin IVA)`;
        document.querySelectorAll('#pantalla-juego input').forEach(i => i.value = "");
    }

    function validarAsiento() {
        const cd = document.getElementById('cd').value, ch = document.getElementById('ch').value, id = document.getElementById('id').value, ih = document.getElementById('ih').value;
        if(cd == asntSol.cd && ch == asntSol.ch && id == asntSol.v && ih == asntSol.v) { alert("⭐ ¡PERFECTO! Asiento cuadrado."); cerrarAsiento(); }
        else alert("❌ Revisa los códigos o importes.");
    }

    function cerrarAsiento() { document.getElementById('menu').style.display='block'; document.getElementById('pantalla-juego').style.display='none'; }
    document.getElementById('cd').oninput = function() { document.getElementById('nd').value = PGC[this.value] || "No existe"; };
    document.getElementById('ch').oninput = function() { document.getElementById('nh').value = PGC[this.value] || "No existe"; };
</script>
</body>
</html>
