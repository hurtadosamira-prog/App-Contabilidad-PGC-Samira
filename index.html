<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>✨ ContaMaster Pro ✨</title>
    <style>
        :root { 
            --fucsia: #D47088; --rosa: #FFF0F5; --rojo: #FF4D4D; --verde: #2E7D32; 
            --azul: #4A90E2; --naranja: #FF9800; --morado: #9C27B0; --teal: #009688; --grey: #607D8B;
        }
        body { font-family: 'Segoe UI', sans-serif; background: #F5F5F5; margin: 0; padding: 40px; color: #333; font-size: 20px; }
        .container { max-width: 1400px; margin: auto; }
        #menu { display: block; text-align: center; }
        .tri-selector { display: grid; grid-template-columns: repeat(2, 1fr); gap: 40px; margin-top: 50px; }
        .btn-trimestre { background: #FFF; border: 4px solid var(--fucsia); border-radius: 40px; padding: 80px 20px; font-size: 2.5em; font-weight: bold; color: var(--fucsia); cursor: pointer; transition: 0.3s; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .btn-trimestre:hover { background: var(--fucsia); color: #FFF; transform: translateY(-10px); }
        #vista-juegos { display: none; }
        .card { background: #FFF; border: 3px solid #EEE; border-radius: 30px; padding: 25px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); margin-top: 20px; }
        .titulo-seccion { color: var(--fucsia); font-weight: bold; text-align: left; border-left: 8px solid var(--fucsia); padding-left: 15px; margin-bottom: 25px; font-size: 1.8em; display: flex; justify-content: space-between; align-items: center; }
        .grid-btns { display: grid; grid-template-columns: repeat(6, 1fr); gap: 15px; }
        .btn-j { background: #FFF; border: 2px solid #DDD; border-radius: 18px; padding: 25px 5px; cursor: pointer; transition: 0.2s; display: flex; flex-direction: column; align-items: center; }
        .btn-j:hover { background: var(--rosa); border-color: var(--fucsia); transform: scale(1.05); }
        .btn-j span { font-size: 2.5em; }
        .btn-j small { font-size: 0.8em; font-weight: bold; color: #777; margin-top: 10px; text-align: center; }
        
        #pantalla-juego { display: none; background: #FFF; padding: 40px; border-radius: 40px; border: 5px solid var(--fucsia); }
        .box { background: var(--rosa); padding: 30px; border-radius: 25px; margin-bottom: 30px; font-size: 1.5em; font-weight: bold; text-align: center; position: relative; }
        .row { display: grid; grid-template-columns: 140px 1fr 200px; gap: 20px; margin-bottom: 15px; width: 100%; max-width: 900px; margin: auto; }
        input { padding: 20px; border: 3px solid #DDD; border-radius: 15px; text-align: center; font-size: 22px; width: 100%; box-sizing: border-box; }
        
        .btn-footer { display: flex; justify-content: center; gap: 20px; max-width: 900px; margin: 20px auto; }
        .btn-main { background: var(--fucsia); color: #FFF; flex: 2; padding: 20px; border-radius: 20px; font-size: 1.4em; border: none; font-weight: bold; cursor: pointer; }
        .btn-alt { background: #FFF; color: var(--fucsia); border: 3px solid var(--fucsia); flex: 1; padding: 20px; border-radius: 20px; font-size: 1.2em; font-weight: bold; cursor: pointer; }
        .btn-hint { background: #FFEB3B; border: none; border-radius: 50%; width: 60px; height: 60px; font-size: 1.5em; cursor: pointer; position: absolute; right: 20px; top: 20px; }

        #game-overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; }
        .modal { background: white; padding: 35px; border-radius: 30px; width: 90%; max-width: 600px; text-align: center; border: 10px solid var(--fucsia); position: relative; }
    </style>
</head>
<body>

<div class="container">
    <div id="menu">
        <h1 style="color: var(--fucsia); font-size: 3.5em;">✨ ContaMaster ✨</h1>
        <div id="selector-trimestres" class="tri-selector">
            <button class="btn-trimestre" onclick="abrirTrimestre(1)">1º TRIMESTRE</button>
            <button class="btn-trimestre" onclick="abrirTrimestre(2)">2º TRIMESTRE</button>
            <button class="btn-trimestre" onclick="abrirTrimestre(3)">3º TRIMESTRE</button>
            <button class="btn-trimestre" onclick="abrirTrimestre(4)">4º TRIMESTRE</button>
        </div>
        <div id="vista-juegos">
            <div class="card">
                <div class="titulo-seccion">
                    <span id="txt-trimestre">TRIMESTRE</span>
                    <button class="btn-alt" style="padding: 10px 20px;" onclick="volverAInicio()">ATRÁS</button>
                </div>
                <div class="grid-btns" id="render-botones"></div>
            </div>
        </div>
    </div>

    <div id="pantalla-juego">
        <div class="box">
            <button class="btn-hint" onclick="darPista()">💡</button>
            <div id="quest"></div>
        </div>
        <div id="area">
            <div class="row">
                <input type="number" id="cd" placeholder="Cod." oninput="updateName(this, 'nd')">
                <input type="text" id="nd" readonly style="background:#eee; border:none;" placeholder="Cuenta...">
                <input type="number" id="id" placeholder="€ Debe">
            </div>
            <div style="text-align:center; font-weight:bold; color:var(--fucsia); margin:10px;">A</div>
            <div class="row">
                <input type="number" id="ch" placeholder="Cod." oninput="updateName(this, 'nh')">
                <input type="text" id="nh" readonly style="background:#eee; border:none;" placeholder="Cuenta...">
                <input type="number" id="ih" placeholder="€ Haber">
            </div>
            <div class="btn-footer">
                <button class="btn-alt" onclick="noDado()">NO DADO</button>
                <button class="btn-main" onclick="checkAsiento()">🚀 VALIDAR</button>
                <button class="btn-alt" style="color:var(--rojo); border-color:var(--rojo);" onclick="cerrarJuego()">SALIR</button>
            </div>
        </div>
        <div id="msg" style="text-align:center; font-weight:bold; margin-top:15px; display:none;"></div>
    </div>
</div>

<div id="game-overlay">
    <div class="modal" id="modal-color">
        <button class="btn-hint" onclick="darPista()">💡</button>
        <h2 id="m-titulo"></h2>
        <div id="m-juego">
            <div id="m-pregunta" style="font-size: 1.4em; margin-bottom: 20px; font-weight: bold;"></div>
            <div id="m-input-area"></div>
            <div class="btn-footer" style="margin-top:20px;">
                <button class="btn-alt" onclick="noDado()">NO DADO</button>
                <button class="btn-main" id="m-btn-validar">VALIDAR</button>
            </div>
        </div>
        <button onclick="document.getElementById('game-overlay').style.display='none'" style="margin-top:20px; background:none; border:none; color:#999; text-decoration:underline; cursor:pointer;">Abandonar</button>
    </div>
</div>

<script>
    const PGC_DATA = {
        1: { 572:"Bancos", 570:"Caja", 430:"Clientes", 400:"Proveedores", 600:"Compras Mercad.", 700:"Ventas Mercad.", 472:"IVA Sop.", 477:"IVA Rep." },
        2: { 216:"Mobiliario", 217:"Equipos Info", 640:"Sueldos", 642:"Seg. Social Empresa", 4751:"Hda. Retenciones", 476:"Org. Seg. Social" },
        3: { 100:"Capital Social", 170:"Deudas L/P", 520:"Deudas C/P", 410:"Acreedores", 628:"Suministros", 129:"Rtdo. Ejercicio" },
        4: { 281:"Amort. Acumulada", 681:"Amort. Inmovilizado", 112:"Reserva Legal", 490:"Deterioro Créditos", 794:"Reversión Deterioro" }
    };

    let triActual = 1, lastId = "", currentAns = "", targetAsiento = null;

    function getPGCActual() {
        let pgcTotal = {};
        for(let i=1; i<=triActual; i++) Object.assign(pgcTotal, PGC_DATA[i]);
        return pgcTotal;
    }

    function abrirTrimestre(n) {
        triActual = n;
        document.getElementById('selector-trimestres').style.display = 'none';
        document.getElementById('vista-juegos').style.display = 'block';
        document.getElementById('txt-trimestre').innerText = n + "º TRIMESTRE";
        const grid = document.getElementById('render-botones');
        grid.innerHTML = "";
        const MODOS = [{id:"balance",i:"⚖️",t:"Balance"},{id:"pgc",i:"🎯",t:"Códigos"},{id:"salto",i:"🏃",t:"Masas"},{id:"iva",i:"🔢",t:"Fiscal"},{id:"examen",i:"🏆",t:"Asientos"}];
        MODOS.forEach(m => grid.innerHTML += `<button class="btn-j" onclick="lanzarModo('${m.id}')"><span>${m.i}</span><small>${m.t}</small></button>`);
    }

    function lanzarModo(id) {
        lastId = id;
        if(id === 'examen') return generarExamen();
        document.getElementById('m-titulo').innerText = "MODO " + id.toUpperCase();
        document.getElementById('game-overlay').style.display = "flex";
        document.getElementById('m-btn-validar').onclick = () => {
            const val = document.getElementById('ans') ? document.getElementById('ans').value : "";
            validarMini(val);
        };
        generarPregunta();
    }

    function generarPregunta() {
        const p = document.getElementById('m-pregunta');
        const a = document.getElementById('m-input-area');
        const pgc = getPGCActual();
        const keys = Object.keys(pgc);
        let k = keys[Math.floor(Math.random()*keys.length)];

        if(lastId === 'iva') {
            let base = Math.floor(Math.random()*1000)+100; currentAns = Math.round(base*0.21);
            p.innerText = "Base: " + base + "€";
            a.innerHTML = `<input type="number" id="ans" placeholder="IVA (21%)">`;
        } else if(lastId === 'salto') {
            currentAns = (k < 400 || k >= 570) ? "A" : "P";
            p.innerText = "¿Qué masa es " + pgc[k] + "?";
            a.innerHTML = `<p>(A) Activo / (P) Pasivo</p><input type="text" id="ans" maxlength="1">`;
        } else {
            currentAns = k;
            p.innerText = "¿Código de " + pgc[k] + "?";
            a.innerHTML = `<input type="number" id="ans">`;
        }
    }

    function darPista() { alert("Pista: La respuesta comienza por " + currentAns.toString()[0]); }
    function noDado() { alert("Saltando ejercicio..."); if(lastId === 'examen') generarExamen(); else generarPregunta(); }

    function validarMini(val) {
        if(val.toString().toUpperCase() == currentAns.toString().toUpperCase()) {
            alert("¡Correcto!");
            generarPregunta();
        } else { alert("Error. Inténtalo de nuevo."); }
    }

    function generarExamen() {
        const pgc = getPGCActual();
        const pool = [
            {q:"Compra Mercaderías Banco", cd:600, ch:572},
            {q:"Venta Mercaderías Banco", cd:572, ch:700}
        ];
        let s = pool[Math.floor(Math.random()*pool.length)];
        let v = 1000;
        targetAsiento = { cd:s.cd, ch:s.ch, v:v };
        document.getElementById('menu').style.display = 'none';
        document.getElementById('pantalla-juego').style.display = 'block';
        document.getElementById('quest').innerHTML = "OPERACIÓN: " + s.q + " por " + v + "€";
        clearInp();
    }

    function checkAsiento() {
        const c1 = document.getElementById('cd').value, c2 = document.getElementById('ch').value;
        const v1 = document.getElementById('id').value, v2 = document.getElementById('ih').value;
        if(c1 == targetAsiento.cd && c2 == targetAsiento.ch && v1 == targetAsiento.v && v2 == targetAsiento.v) {
            alert("¡Asiento Correcto!"); generarExamen();
        } else { alert("Error en el asiento."); }
    }

    function updateName(el, targetId) { document.getElementById(targetId).value = getPGCActual()[el.value] || ""; }
    function volverAInicio() { document.getElementById('selector-trimestres').style.display = 'grid'; document.getElementById('vista-juegos').style.display = 'none'; }
    function cerrarJuego() { document.getElementById('menu').style.display = 'block'; document.getElementById('pantalla-juego').style.display = 'none'; }
    function clearInp() { document.querySelectorAll('#pantalla-juego input').forEach(i => i.value = ""); }
</script>
</body>
</html>
