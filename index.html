<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>✨ ContaMaster ✨</title>
    <style>
        :root { 
            --fucsia: #D47088; --rosa: #FFF0F5; --rojo: #FF4D4D; --verde: #2E7D32; 
            --azul: #4A90E2; --naranja: #FF9800; --morado: #9C27B0; --teal: #009688;
        }
        body { font-family: 'Segoe UI', sans-serif; background: #F5F5F5; margin: 0; padding: 40px; color: #333; font-size: 20px; }
        .container { max-width: 1400px; margin: auto; }
        #menu { display: block; text-align: center; }
        .tri-selector { display: grid; grid-template-columns: repeat(2, 1fr); gap: 40px; margin-top: 50px; }
        .btn-trimestre { background: #FFF; border: 4px solid var(--fucsia); border-radius: 40px; padding: 80px 20px; font-size: 2.5em; font-weight: bold; color: var(--fucsia); cursor: pointer; transition: 0.3s; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .btn-trimestre:hover { background: var(--fucsia); color: #FFF; transform: translateY(-10px); }
        
        #vista-juegos { display: none; }
        .card { background: #FFF; border: 3px solid #EEE; border-radius: 30px; padding: 25px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); margin-top: 20px; }
        .titulo-seccion { color: var(--fucsia); font-weight: bold; text-align: left; border-left: 8px solid var(--fucsia); padding-left: 15px; margin-bottom: 25px; font-size: 1.8em; display: flex; justify-content: space-between; align-items: center; }
        
        .grid-btns { display: grid; grid-template-columns: repeat(6, 1fr); gap: 15px; }
        .btn-j { background: #FFF; border: 2px solid #DDD; border-radius: 18px; padding: 25px 5px; cursor: pointer; transition: 0.2s; display: flex; flex-direction: column; align-items: center; }
        .btn-j:hover { background: var(--rosa); border-color: var(--fucsia); transform: scale(1.05); }
        .btn-j span { font-size: 2.5em; }
        .btn-j small { font-size: 0.8em; font-weight: bold; color: #777; margin-top: 10px; text-align: center; }

        #pantalla-juego { display: none; background: #FFF; padding: 40px; border-radius: 40px; border: 5px solid var(--fucsia); }
        .box { background: var(--rosa); padding: 30px; border-radius: 25px; margin-bottom: 30px; font-size: 1.5em; font-weight: bold; text-align: center; position: relative; }
        
        .btn-hint { background: #FFEB3B; border: none; border-radius: 50%; width: 50px; height: 50px; font-size: 1.2em; cursor: pointer; position: absolute; right: 20px; top: 20px; }
        .row { display: grid; grid-template-columns: 140px 1fr 200px; gap: 20px; margin-bottom: 15px; width: 100%; max-width: 900px; margin: auto; }
        input { padding: 20px; border: 3px solid #DDD; border-radius: 15px; text-align: center; font-size: 22px; width: 100%; box-sizing: border-box; }
        
        .footer-actions { display: flex; justify-content: center; gap: 10px; max-width: 900px; margin: 20px auto; flex-wrap: wrap; }
        .btn-validar { background: var(--fucsia); color: white; border: none; padding: 20px; border-radius: 20px; font-size: 1.2em; font-weight: bold; cursor: pointer; flex: 2; min-width: 200px; }
        .btn-nodado { background: #eee; color: #666; border: none; padding: 15px 25px; border-radius: 15px; font-size: 1em; font-weight: bold; cursor: pointer; }
        .btn-solucion { background: var(--teal); color: white; border: none; padding: 15px 25px; border-radius: 15px; font-size: 1em; font-weight: bold; cursor: pointer; }

        #game-overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; }
        .modal { background: white; padding: 40px; border-radius: 30px; width: 90%; max-width: 600px; text-align: center; border: 10px solid var(--fucsia); position: relative; }
    </style>
</head>
<body>

<div class="container">
    <div id="menu">
        <h1 style="color: var(--fucsia); font-size: 3.5em;">✨ ContaMaster ✨</h1>
        <div id="selector-trimestres" class="tri-selector">
            <button class="btn-trimestre" onclick="abrirTrimestre(1)">1º TRIMESTRE</button>
            <button class="btn-trimestre" onclick="abrirTrimestre(2)">2º TRIMESTRE</button>
            <button class="btn-trimestre" onclick="abrirTrimestre(3)">3º TRIMESTRE</button>
            <button class="btn-trimestre" onclick="abrirTrimestre(4)">4º TRIMESTRE</button>
        </div>
        <div id="vista-juegos">
            <div class="card">
                <div class="titulo-seccion">
                    <span id="txt-trimestre">TRIMESTRE</span>
                    <button onclick="volverAInicio()" style="background:#999; color:white; border:none; padding:8px 15px; border-radius:8px; cursor:pointer; font-size:0.5em;">ATRÁS</button>
                </div>
                <div class="grid-btns" id="render-botones"></div>
            </div>
        </div>
    </div>

    <div id="pantalla-juego">
        <div class="box">
            <button class="btn-hint" onclick="darPista()">💡</button>
            <div id="quest"></div>
        </div>
        <div id="area">
            <div class="row">
                <input type="number" id="cd" placeholder="Cod." oninput="updateName(this, 'nd')">
                <input type="text" id="nd" readonly style="background:#eee;" placeholder="Cuenta...">
                <input type="number" id="id" placeholder="€ Debe">
            </div>
            <div style="text-align:center; font-weight:bold; color:var(--fucsia); margin:10px;">A</div>
            <div class="row">
                <input type="number" id="ch" placeholder="Cod." oninput="updateName(this, 'nh')">
                <input type="text" id="nh" readonly style="background:#eee;" placeholder="Cuenta...">
                <input type="number" id="ih" placeholder="€ Haber">
            </div>
            <div class="footer-actions">
                <button class="btn-nodado" onclick="noDado()">NO DADO</button>
                <button class="btn-solucion" onclick="verSolucion()">SOLUCIÓN</button>
                <button class="btn-validar" onclick="checkAsiento()">🚀 VALIDAR ASIENTO</button>
            </div>
            <button class="btn-nodado" style="width:100%; background:var(--rojo); color:white; margin-top:10px;" onclick="cerrarJuego()">SALIR</button>
        </div>
    </div>
</div>

<div id="game-overlay">
    <div class="modal" id="modal-color">
        <button class="btn-hint" onclick="darPista()">💡</button>
        <h2 id="m-titulo"></h2>
        <div id="m-pregunta" style="font-size: 1.4em; margin: 20px 0; font-weight: bold;"></div>
        <div id="m-input-area"></div>
        <div class="footer-actions">
            <button class="btn-nodado" onclick="noDado()">NO DADO</button>
            <button class="btn-solucion" onclick="verSolucion()">SOLUCIÓN</button>
            <button class="btn-validar" id="m-btn-validar">VALIDAR</button>
        </div>
        <button onclick="document.getElementById('game-overlay').style.display='none'" style="margin-top:20px; background:none; border:none; color:#999; text-decoration:underline; cursor:pointer;">Cerrar</button>
    </div>
</div>

<script>
    // PGC Oficial basado en plangeneralcontable.com
    const PGC_DATA = {
        1: {572:"Bancos c/c", 570:"Caja, €", 430:"Clientes", 400:"Proveedores", 600:"Compras de mercaderías", 700:"Ventas de mercaderías", 472:"H.P., IVA soportado", 477:"H.P., IVA repercutido"},
        2: {216:"Mobiliario", 640:"Sueldos y salarios", 4751:"H.P., acreedora por retenciones practicadas", 4720:"H.P., IVA soportado (Intracom.)", 4770:"H.P., IVA repercutido (Intracom.)", 4721:"H.P., IVA soportado (Importaciones)"},
        3: {300:"Mercaderías", 610:"Variación de existencias de mercaderías", 480:"Gastos anticipados", 485:"Ingresos anticipados", 129:"Resultado del ejercicio", 628:"Suministros"},
        4: {281:"Amort. acumulada del inmovilizado material", 681:"Amortización del inmovilizado material", 4700:"H.P., deudora por IVA", 4750:"H.P., acreedora por IVA", 490:"Deterioro de valor de créditos comerciales", 794:"Reversión del deterioro de créditos comerciales"}
    };

    let triActual = 1, lastId = "", currentAns = "", targetAsiento = null;

    function getPGCActual() {
        let p = {};
        for(let i=1; i<=triActual; i++) Object.assign(p, PGC_DATA[i]);
        return p;
    }

    // Juegos distribuidos por trimestre del año natural
    const MODOS = {
        1: [{id:"balance", i:"⚖️", t:"Liquidación"}, {id:"pgc", i:"🎯", t:"Especiales"}, {id:"salto", i:"🏃", t:"Ext / Intra"}],
        2: [{id:"iva", i:"🔢", t:"Valoración"}, {id:"memoria", i:"🧩", t:"Contrapartida"}, {id:"fuga", i:"🕳️", t:"Existencias"}],
        3: [{id:"puzle", i:"🖼️", t:"Valor Neto"}, {id:"auditor", i:"⚡", t:"Cierres"}, {id:"escalera", i:"🪜", t:"Periodificar"}],
        4: [{id:"sopa", i:"🔍", t:"Retenciones"}, {id:"examen", i:"🏆", t:"Diario Complejo"}]
    };

    function abrirTrimestre(n) {
        triActual = n;
        document.getElementById('selector-trimestres').style.display = 'none';
        document.getElementById('vista-juegos').style.display = 'block';
        document.getElementById('txt-trimestre').innerText = n + "º TRIMESTRE";
        const grid = document.getElementById('render-botones');
        grid.innerHTML = "";
        MODOS[n].forEach(m => grid.innerHTML += `<button class="btn-j" onclick="lanzar('${m.id}')"><span>${m.i}</span><small>${m.t}</small></button>`);
    }

    function lanzar(id) {
        lastId = id;
        if(id === 'examen') return generarExamen();
        document.getElementById('m-titulo').innerText = "MODO " + id.toUpperCase();
        document.getElementById('game-overlay').style.display = 'flex';
        document.getElementById('m-btn-validar').onclick = () => validarMini(document.getElementById('ans').value);
        generarPregunta();
    }

    function generarPregunta() {
        const p = document.getElementById('m-pregunta');
        const a = document.getElementById('m-input-area');
        const pgc = getPGCActual();
        const keys = Object.keys(pgc);
        let k = keys[Math.floor(Math.random()*keys.length)];
        
        let styleInp = 'style="width:100%; padding:20px; border-radius:15px; border:2px solid #ddd; font-size:1.5em; text-align:center;"';

        // Lógicas ajustadas estrictamente a las Normas de Registro y Valoración del PGC
        switch(lastId) {
            case 'balance': // Liquidación de IVA 
                let sop = Math.floor(Math.random() * 5000) + 1000;
                let rep = sop + Math.floor(Math.random() * 3000) + 100;
                currentAns = rep - sop;
                p.innerText = `Liquidación IVA: Repercutido = ${rep}€ | Soportado = ${sop}€`;
                a.innerHTML = `<p>¿Importe de la deuda con Hacienda (4750 H.P. acreedora por IVA)?</p><input type="number" id="ans" autofocus ${styleInp}>`;
                break;
                
            case 'pgc': // Exactitud en cuentas clave
                currentAns = k;
                p.innerText = `¿Cuál es el CÓDIGO exacto en el PGC de: ${pgc[k]}?`;
                a.innerHTML = `<input type="number" id="ans" autofocus ${styleInp}>`;
                break;
                
            case 'salto': // DUA / Intracomunitaria
                let intraArr = ['Francia', 'Italia', 'Alemania'];
                let extraArr = ['Japón', 'EEUU', 'China'];
                let isIntra = Math.random() > 0.5;
                let pais = isIntra ? intraArr[Math.floor(Math.random()*intraArr.length)] : extraArr[Math.floor(Math.random()*extraArr.length)];
                currentAns = isIntra ? "I" : "E";
                p.innerText = `Adquisición de mercaderías provenientes de ${pais}.`;
                a.innerHTML = `<p>¿Operación (I)ntracomunitaria o (E)xtracomunitaria/DUA?</p><input type="text" id="ans" maxlength="1" autofocus ${styleInp}>`;
                break;
                
            case 'iva': // Valoración PGC: Descuentos disminuyen, transportes aumentan la Base
                let importe_bruto = Math.floor(Math.random()*8000) + 1000;
                let desc_factura = Math.floor(Math.random()*800) + 50;
                let transporte = Math.floor(Math.random()*300) + 20;
                currentAns = importe_bruto - desc_factura + transporte;
                p.innerText = `Factura: Importe bruto ${importe_bruto}€. Descuento comercial ${desc_factura}€. Transportes ${transporte}€.`;
                a.innerHTML = `<p>Según PGC, ¿Cuál es la BASE IMPONIBLE para aplicar el IVA?</p><input type="number" id="ans" autofocus ${styleInp}>`;
                break;
                
            case 'memoria': // Relación natural Debe/Haber
                let pares = [
                    {q:"Variación de existencias de mercaderías (610)", a:"300"}, {q:"Amortización del inmovilizado material (681)", a:"281"},
                    {q:"H.P., acreedora por IVA (4750)", a:"477"}, {q:"H.P., deudora por IVA (4700)", a:"472"},
                    {q:"Reversión del deterioro de créditos comerciales (794)", a:"490"}, {q:"Gastos anticipados (480)", a:"628"}
                ];
                let par = pares[Math.floor(Math.random()*pares.length)];
                currentAns = par.a;
                p.innerText = `¿Qué cuenta de BALANCE interactúa directamente con: ${par.q}?`;
                a.innerHTML = `<p>Escribe su código:</p><input type="number" id="ans" autofocus ${styleInp}>`;
                break;
                
            case 'fuga': // Norma de valoración Existencias
                let ei = Math.floor(Math.random()*10000) + 2000;
                let ef = ei + (Math.floor(Math.random()*4000) - 2000); 
                currentAns = ef;
                p.innerText = `Inventario físico: Existencias Iniciales ${ei}€. Existencias Finales ${ef}€.`;
                a.innerHTML = `<p>Tras regularizar (asiento 610/300 y 300/610), ¿qué SALDO queda en la (300)?</p><input type="number" id="ans" autofocus ${styleInp}>`;
                break;
                
            case 'puzle': // Valor Contable (Valor en Libros)
                let precioAdq = Math.floor(Math.random()*50000) + 10000;
                let amortAcum = Math.floor(Math.random()*8000) + 2000;
                let deterioro = Math.floor(Math.random()*1000);
                currentAns = precioAdq - amortAcum - deterioro;
                p.innerText = `Precio de Adquisición: ${precioAdq}€ | Amortización Acum: ${amortAcum}€ | Deterioro: ${deterioro}€`;
                a.innerHTML = `<p>Calcula el VALOR CONTABLE del inmovilizado (Valor Neto):</p><input type="number" id="ans" autofocus ${styleInp}>`;
                break;
                
            case 'auditor': // Mecánica del Asiento de Regularización (Cierre)
                let cuentasCierre = keys.filter(x => x.startsWith('6') || x.startsWith('7'));
                if(cuentasCierre.length === 0) cuentasCierre = ['600'];
                let k_cierre = cuentasCierre[Math.floor(Math.random()*cuentasCierre.length)];
                currentAns = k_cierre.startsWith('6') ? "H" : "D";
                p.innerText = `Para saldar/cerrar la cuenta ${pgc[k_cierre]} contra la (129) Resultado del ejercicio...`;
                a.innerHTML = `<p>¿Anotas la ${k_cierre} en el (D)ebe o en el (H)aber?</p><input type="text" id="ans" maxlength="1" autofocus ${styleInp}>`;
                break;
                
            case 'escalera': // Principio de Devengo / Periodificación
                let cuota_mes = Math.floor(Math.random()*20)*10 + 50; 
                let meses_sig = Math.floor(Math.random()*10) + 1;
                let prima_anual = cuota_mes * 12;
                currentAns = cuota_mes * meses_sig;
                p.innerText = `Abonas seguro anual por ${prima_anual}€. ${meses_sig} meses corresponden al ejercicio siguiente.`;
                a.innerHTML = `<p>A 31/12, ¿qué importe cargas a la (480) Gastos Anticipados?</p><input type="number" id="ans" autofocus ${styleInp}>`;
                break;
                
            case 'sopa': // IRPF Profesionales / Alquileres
                let base_ret = Math.floor(Math.random()*4000) + 500;
                let retRate = [19, 15, 7][Math.floor(Math.random()*3)];
                currentAns = Math.round(base_ret * (retRate/100));
                p.innerText = `Factura recibida de un asesor. Base: ${base_ret}€. Retención IRPF en factura: ${retRate}%.`;
                a.innerHTML = `<p>¿Qué importe abonas a la (4751) H.P., acreedora por retenciones?</p><input type="number" id="ans" autofocus ${styleInp}>`;
                break;
        }
    }

    function darPista() { alert("Pista: Empieza o contiene un " + currentAns.toString()[0]); }
    function noDado() { alert("Saltando al siguiente..."); if(lastId === 'examen') generarExamen(); else generarPregunta(); }

    function verSolucion() {
        if(lastId === 'examen') {
            alert(`Solución Asiento:\nDebe: ${targetAsiento.cd} (${targetAsiento.v}€)\nHaber: ${targetAsiento.ch} (${targetAsiento.v}€)`);
        } else {
            alert(`La respuesta correcta es: ${currentAns}`);
        }
    }

    function validarMini(v) {
        if(v.toString().toUpperCase() == currentAns.toString().toUpperCase()) { alert("¡Correcto!"); generarPregunta(); }
        else { alert("Incorrecto, vuelve a intentarlo."); }
    }

    function generarExamen() {
        // Operaciones de diario estructuradas estrictamente a 2 cuentas para no inducir a error en el modelo Debe/Haber simple
        const operaciones = [
            {q:"Autorrepercusión de IVA por Adquisición Intracomunitaria", cd:4720, ch:4770},
            {q:"Dotación anual a la amortización del inmovilizado material", cd:681, ch:281},
            {q:"Imputación a resultados de Gastos anticipados del ejercicio anterior", cd:628, ch:480},
            {q:"Asiento de Regularización: Cierre de la cuenta de Ventas contra Rtdo. Ejercicio", cd:700, ch:129},
            {q:"Asiento de Regularización: Cierre de la cuenta de Compras contra Rtdo. Ejercicio", cd:129, ch:600},
            {q:"Variación Existencias: Dar de baja las existencias iniciales", cd:610, ch:300},
            {q:"Variación Existencias: Reconocer las existencias finales", cd:300, ch:610},
            {q:"Reconocimiento de la reversión del deterioro de créditos comerciales", cd:490, ch:794},
            {q:"Pago de la liquidación del IVA a Hacienda mediante banco", cd:4750, ch:572},
            {q:"Cobro de la devolución del IVA por parte de Hacienda mediante banco", cd:572, ch:4700},
            {q:"Cobro de factura pendiente a clientes por banco", cd:572, ch:430},
            {q:"Pago de deuda a proveedores por transferencia", cd:400, ch:572},
            {q:"Imputación a resultados de Ingresos anticipados del ejercicio anterior", cd:485, ch:700}
        ];
        
        let s = operaciones[Math.floor(Math.random()*operaciones.length)];
        let v = Math.floor(Math.random()*9500)+500;
        targetAsiento = { cd:s.cd, ch:s.ch, v:v };
        
        document.getElementById('menu').style.display = 'none';
        document.getElementById('pantalla-juego').style.display = 'block';
        document.getElementById('quest').innerText = `Diario T${triActual}: ${s.q} por ${targetAsiento.v}€`;
        clearInp();
    }

    function checkAsiento() {
        if(document.getElementById('cd').value == targetAsiento.cd && document.getElementById('ch').value == targetAsiento.ch && document.getElementById('id').value == targetAsiento.v) {
            alert("¡Asiento correcto y cuadrado según PGC!"); generarExamen();
        } else { alert("Error en los códigos del asiento o en los importes."); }
    }

    function updateName(el, targetId) { document.getElementById(targetId).value = getPGCActual()[el.value] || ""; }
    function volverAInicio() { document.getElementById('selector-trimestres').style.display = 'grid'; document.getElementById('vista-juegos').style.display = 'none'; }
    function cerrarJuego() { document.getElementById('menu').style.display = 'block'; document.getElementById('pantalla-juego').style.display = 'none'; }
    function clearInp() { document.querySelectorAll('#pantalla-juego input').forEach(i => i.value = ""); }
</script>
</body>
</html>
