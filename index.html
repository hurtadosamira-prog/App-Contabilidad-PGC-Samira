<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>✨ ContaMaster ✨</title>
    <style>
        :root { --fucsia: #D47088; --rosa: #FFF0F5; --rojo: #FF4D4D; --verde: #2E7D32; }
        body { font-family: 'Segoe UI', sans-serif; background: #F5F5F5; margin: 0; padding: 40px; color: #333; font-size: 20px; }
        .container { max-width: 1400px; margin: auto; }
        #menu { display: block; text-align: center; }
        .tri-selector { display: grid; grid-template-columns: repeat(2, 1fr); gap: 40px; margin-top: 50px; }
        .btn-trimestre { background: #FFF; border: 4px solid var(--fucsia); border-radius: 40px; padding: 80px 20px; font-size: 2.5em; font-weight: bold; color: var(--fucsia); cursor: pointer; transition: 0.3s; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .btn-trimestre:hover { background: var(--fucsia); color: #FFF; transform: translateY(-10px); }
        #vista-juegos { display: none; }
        .card { background: #FFF; border: 3px solid #EEE; border-radius: 30px; padding: 25px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); margin-top: 20px; }
        .titulo-seccion { color: var(--fucsia); font-weight: bold; text-align: left; border-left: 8px solid var(--fucsia); padding-left: 15px; margin-bottom: 25px; font-size: 1.8em; display: flex; justify-content: space-between; align-items: center; }
        .grid-btns { display: grid; grid-template-columns: repeat(6, 1fr); gap: 15px; }
        .btn-j { background: #FFF; border: 2px solid #DDD; border-radius: 18px; padding: 25px 5px; cursor: pointer; transition: 0.2s; display: flex; flex-direction: column; align-items: center; }
        .btn-j:hover { background: var(--rosa); border-color: var(--fucsia); transform: scale(1.05); }
        .btn-j span { font-size: 2.5em; }
        .btn-j small { font-size: 0.8em; font-weight: bold; color: #777; margin-top: 10px; }
        #pantalla-juego { display: none; background: #FFF; padding: 40px; border-radius: 40px; border: 5px solid var(--fucsia); box-shadow: 0 25px 60px rgba(0,0,0,0.1); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .btn-esc { background: var(--rojo); color: #FFF; border: none; padding: 15px 35px; border-radius: 15px; font-weight: bold; cursor: pointer; font-size: 20px; }
        .box { background: var(--rosa); padding: 30px; border-radius: 25px; margin-bottom: 30px; font-size: 1.5em; font-weight: bold; position: relative; }
        .row { display: grid; grid-template-columns: 140px 1fr 200px; gap: 20px; margin-bottom: 15px; width: 100%; max-width: 900px; margin: auto; }
        input { padding: 20px; border: 3px solid #DDD; border-radius: 15px; text-align: center; font-size: 22px; width: 100%; box-sizing: border-box; }
        .cta-name { background: #F5F5F5; border: none; color: var(--fucsia); font-weight: bold; text-align: left; padding-left: 20px; font-size: 22px; }
        .btn-val { background: var(--fucsia); color: #FFF; width: 100%; max-width: 900px; padding: 25px; border-radius: 20px; font-size: 1.6em; border: none; font-weight: bold; cursor: pointer; display: block; margin: 40px auto; }
        #msg { margin-top: 25px; padding: 20px; border-radius: 20px; text-align: center; display: none; font-weight: bold; font-size: 22px; }
        .btn-check { background: var(--fucsia); color: white; border: none; padding: 12px 24px; border-radius: 10px; cursor: pointer; margin: 10px 5px; font-weight: bold; font-size: 18px; }
    </style>
</head>
<body>

<div class="container">
    <div id="menu">
        <h1 style="color: var(--fucsia); font-size: 3.5em; margin-bottom: 10px;">✨ ContaMaster ✨</h1>
        <div id="selector-trimestres" class="tri-selector">
            <button class="btn-trimestre" onclick="abrirTrimestre(0)">1º TRIMESTRE</button>
            <button class="btn-trimestre" onclick="abrirTrimestre(1)">2º TRIMESTRE</button>
            <button class="btn-trimestre" onclick="abrirTrimestre(2)">3º TRIMESTRE</button>
            <button class="btn-trimestre" onclick="abrirTrimestre(3)">4º TRIMESTRE</button>
        </div>
        <div id="vista-juegos">
            <div class="card">
                <div class="titulo-seccion">
                    <span id="txt-trimestre">TRIMESTRE</span>
                    <button class="btn-esc" style="background: #999;" onclick="volverAInicio()">ATRÁS</button>
                </div>
                <div class="grid-btns" id="render-botones"></div>
            </div>
        </div>
    </div>

    <div id="pantalla-juego">
        <div class="header">
            <button class="btn-esc" onclick="cerrarJuego()">✖️ SALIR</button>
            <div id="game-title" style="font-weight:bold; color:var(--fucsia); font-size: 1.6em;">EXAMEN FINAL</div>
            <div id="timer" style="font-weight:bold; font-size: 2.5em; color: var(--fucsia);">00:00</div>
        </div>
        <div class="box">
            <div id="quest"></div>
        </div>
        <div id="area">
            <div class="row">
                <input type="number" id="cd" placeholder="Código" oninput="updateName(this, 'nd')">
                <input type="text" id="nd" class="cta-name" readonly placeholder="Cuenta...">
                <input type="number" id="id" placeholder="€ Debe">
            </div>
            <div style="text-align:center; font-weight:bold; color:var(--fucsia); margin:15px; font-size: 1.5em;">A</div>
            <div class="row">
                <input type="number" id="ch" placeholder="Código" oninput="updateName(this, 'nh')">
                <input type="text" id="nh" class="cta-name" readonly placeholder="Cuenta...">
                <input type="number" id="ih" placeholder="€ Haber">
            </div>
            <button class="btn-val" onclick="check()">🚀 VALIDAR ASIENTO</button>
        </div>
        <div id="msg"></div>
    </div>
</div>

<div id="game-overlay" style="display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; color: white;">
    <div style="background: white; color: #333; padding: 30px; border-radius: 20px; width: 90%; max-width: 500px; text-align: center;">
        <h2 id="mini-g-title" style="color: var(--fucsia); margin-top:0;"></h2>
        <div id="mini-g-instr" style="font-style: italic; color: #666; margin-bottom: 15px; font-size: 0.9em; border-bottom: 1px solid #EEE; padding-bottom: 10px;"></div>
        <div id="mini-g-content" style="font-size: 1.3em; margin-bottom: 20px;"></div>
        <div id="mini-feedback" style="margin: 15px 0; font-weight: bold; min-height: 30px; font-size: 1.2em;"></div>
        <button id="btn-start-mini" style="background: var(--verde); color: white; border: none; padding: 12px 25px; border-radius: 10px; cursor: pointer; font-weight: bold; display:none;" onclick="startLoop()">EMPEZAR</button>
        <button onclick="document.getElementById('game-overlay').style.display='none'" style="background: #999; color: white; border: none; padding: 12px 25px; border-radius: 10px; cursor: pointer; font-weight: bold;">SALIR</button>
    </div>
</div>

<script>
    const PGC = { 100:"Capital Social", 129:"Rtdo. Ejercicio", 210:"Terrenos", 216:"Mobiliario", 217:"Equipos Info", 300:"Mercaderías", 400:"Proveedores", 430:"Clientes", 472:"IVA Sop.", 477:"IVA Rep.", 572:"Bancos", 600:"Compras", 700:"Ventas", 628:"Suministros", 640:"Sueldos" };
    const INFO_MODOS = {
        balance: "Calcula la suma total de las partidas del Debe para equilibrar el Haber.",
        pgc: "Escribe el código numérico exacto de la cuenta contable que se muestra.",
        salto: "Identifica rápidamente el código del PGC para esta cuenta.",
        iva: "Calcula el 21% de IVA de la base imponible indicada.",
        auditor: "Responde si la cuenta mostrada pertenece al grupo de Activo (Bienes y Derechos).",
        sopa: "Localiza el código correcto para la cuenta descrita.",
        examen: "Registra el asiento contable completo (códigos e importes) de la operación."
    };

    let ejActual = null, currentMiniAnswer = "", lastMode = "";

    function abrirTrimestre(tIdx) {
        document.getElementById('selector-trimestres').style.display = 'none';
        document.getElementById('vista-juegos').style.display = 'block';
        document.getElementById('txt-trimestre').innerText = (tIdx + 1) + "º TRIMESTRE";
        const r = document.getElementById('render-botones');
        r.innerHTML = "";
        const mList = [
            {id:"balance", i:"⚖️", t:"Balance"}, {id:"pgc", i:"🎯", t:"PGC"}, {id:"iva", i:"🔢", t:"IVA"}, 
            {id:"auditor", i:"⚡", t:"Auditor"}, {id:"sopa", i:"🔍", t:"Sopa"}, {id:"examen", i:"🏆", t:"Examen"}
        ];
        mList.forEach(m => {
            r.innerHTML += `<button class="btn-j" onclick="prepararJuego('${m.id}', '${m.t}')"><span>${m.i}</span><small>${m.t}</small></button>`;
        });
    }

    function prepararJuego(id, titulo) {
        if(id === 'examen') {
            alert("INSTRUCCIÓN: " + INFO_MODOS.examen);
            generarAsientoAleatorio();
        } else {
            lastMode = id;
            const overlay = document.getElementById('game-overlay');
            document.getElementById('mini-g-title').innerText = titulo;
            document.getElementById('mini-g-instr').innerText = INFO_MODOS[id];
            document.getElementById('mini-g-content').innerHTML = "Pulsa empezar para generar el primer ejercicio.";
            document.getElementById('mini-feedback').innerText = "";
            document.getElementById('btn-start-mini').style.display = "inline-block";
            overlay.style.display = 'flex';
        }
    }

    function startLoop() {
        document.getElementById('btn-start-mini').style.display = "none";
        launchMini(lastMode);
    }

    function launchMini(gameId) {
        const content = document.getElementById('mini-g-content');
        const fb = document.getElementById('mini-feedback');
        fb.innerText = "";
        
        const rVal = () => Math.floor(Math.random() * 5000) + 100;
        const keys = Object.keys(PGC);

        switch(gameId) {
            case 'balance':
                let v1 = rVal(), v2 = rVal(); currentMiniAnswer = v1 + v2;
                content.innerHTML = `<p style="font-size:0.8em; color:var(--fucsia)">EQUILIBRA EL ASIENTO</p><p>Debe: ${v1}€ y ${v2}€</p><p><b>¿Cuál es el importe total del Haber?</b></p><input type="number" id="mini-ans" autofocus onkeydown="if(event.key==='Enter') checkMini(this.value)">`;
                break;
            case 'iva':
                let base = (Math.floor(Math.random()*30)+1)*10; currentMiniAnswer = (base * 0.21).toFixed(1);
                content.innerHTML = `<p style="font-size:0.8em; color:var(--fucsia)">CÁLCULO IMPOSITIVO (21%)</p><p>Base Imponible: ${base}€</p><p><b>¿Cuánto es el IVA Soportado?</b></p><input type="number" step="0.1" id="mini-ans" autofocus onkeydown="if(event.key==='Enter') checkMini(this.value)">`;
                break;
            case 'auditor':
                let kAudit = keys[Math.floor(Math.random()*keys.length)];
                let isAct = kAudit < 400 ? "V" : "F"; currentMiniAnswer = isAct;
                content.innerHTML = `<p style="font-size:0.8em; color:var(--fucsia)">CLASIFICACIÓN DE CUENTAS</p><p>¿Es la cuenta <b>${kAudit} - ${PGC[kAudit]}</b> de Activo?</p><button class="btn-check" onclick="checkMini('V')">SÍ (Verdadero)</button><button class="btn-check" onclick="checkMini('F')">NO (Falso)</button>`;
                break;
            default:
                let kr = keys[Math.floor(Math.random()*keys.length)]; currentMiniAnswer = kr;
                content.innerHTML = `<p style="font-size:0.8em; color:var(--fucsia)">BUSCA EN EL PGC</p><p><b>¿Cuál es el código de "${PGC[kr]}"?</b></p><input type="number" id="mini-ans" autofocus onkeydown="if(event.key==='Enter') checkMini(this.value)">`;
        }
        setTimeout(() => { if(document.getElementById('mini-ans')) document.getElementById('mini-ans').focus(); }, 100);
    }

    function checkMini(val) {
        const fb = document.getElementById('mini-feedback');
        if (parseFloat(val) == parseFloat(currentMiniAnswer) || val.toString().toUpperCase() == currentMiniAnswer) {
            fb.innerHTML = "<span style='color:green'>✔ ¡CORRECTO! Generando siguiente...</span>";
            setTimeout(() => { launchMini(lastMode); }, 800);
        } else {
            fb.innerHTML = "<span style='color:red'>✘ Respuesta incorrecta. Inténtalo de nuevo.</span>";
        }
    }

    function generarAsientoAleatorio() {
        const tipos = [
            {e:"COMPRA de mercaderías al contado",cd:600,ch:572},
            {e:"VENTA de mercaderías cobrada por banco",cd:572,ch:700},
            {e:"PAGO de factura de suministros (Luz)",cd:628,ch:572},
            {e:"PAGO de nóminas de empleados",cd:640,ch:572}
        ];
        let sel = tipos[Math.floor(Math.random()*tipos.length)];
        let monto = (Math.floor(Math.random()*20)+1)*50;
        ejActual = { cd:sel.cd, ch:sel.ch, v:monto };
        document.getElementById('menu').style.display = 'none';
        document.getElementById('pantalla-juego').style.display = 'block';
        document.getElementById('quest').innerHTML = `<b style="color:var(--fucsia)">ENUNCIADO:</b><br>${sel.e} por un valor de <b>${monto}€</b>.`;
        document.getElementById('msg').style.display = 'none';
        clearInp();
    }

    function check() {
        const m = document.getElementById('msg');
        const c1 = document.getElementById('cd').value, c2 = document.getElementById('ch').value;
        const v1 = document.getElementById('id').value, v2 = document.getElementById('ih').value;
        if(c1==ejActual.cd && c2==ejActual.ch && v1==ejActual.v && v2==ejActual.v) {
            m.innerText = "⭐ ¡ASIENTO CORRECTO! Preparando el próximo reto..."; m.style.color="green"; m.style.display="block";
            setTimeout(generarAsientoAleatorio, 1500);
        } else { m.innerText = "❌ Error en el asiento. Revisa códigos e importes."; m.style.color="red"; m.style.display="block"; }
    }

    function updateName(el, targetId) { document.getElementById(targetId).value = PGC[el.value] || ""; }
    function volverAInicio() { document.getElementById('selector-trimestres').style.display = 'grid'; document.getElementById('vista-juegos').style.display = 'none'; }
    function cerrarJuego() { document.getElementById('menu').style.display = 'block'; document.getElementById('pantalla-juego').style.display = 'none'; }
    function clearInp() { document.querySelectorAll('#pantalla-juego input').forEach(i => i.value = ""); }
</script>
</body>
</html>
