<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>✨ ContaMaster ✨</title>
    <style>
        :root { --fucsia: #D47088; --rosa: #FFF0F5; --rojo: #FF4D4D; --verde: #2E7D32; }
        body { font-family: 'Segoe UI', sans-serif; background: #F5F5F5; margin: 0; padding: 40px; color: #333; font-size: 20px; }
        .container { max-width: 1400px; margin: auto; }
        #menu { display: block; text-align: center; }
        .tri-selector { display: grid; grid-template-columns: repeat(2, 1fr); gap: 40px; margin-top: 50px; }
        .btn-trimestre { background: #FFF; border: 4px solid var(--fucsia); border-radius: 40px; padding: 80px 20px; font-size: 2.5em; font-weight: bold; color: var(--fucsia); cursor: pointer; transition: 0.3s; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .btn-trimestre:hover { background: var(--fucsia); color: #FFF; transform: translateY(-10px); }
        #vista-juegos { display: none; }
        .card { background: #FFF; border: 3px solid #EEE; border-radius: 30px; padding: 25px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); margin-top: 20px; }
        .titulo-seccion { color: var(--fucsia); font-weight: bold; text-align: left; border-left: 8px solid var(--fucsia); padding-left: 15px; margin-bottom: 25px; font-size: 1.8em; display: flex; justify-content: space-between; align-items: center; }
        .grid-btns { display: grid; grid-template-columns: repeat(6, 1fr); gap: 15px; }
        .btn-j { background: #FFF; border: 2px solid #DDD; border-radius: 18px; padding: 25px 5px; cursor: pointer; transition: 0.2s; display: flex; flex-direction: column; align-items: center; }
        .btn-j:hover { background: var(--rosa); border-color: var(--fucsia); transform: scale(1.05); }
        .btn-j span { font-size: 2.5em; }
        .btn-j small { font-size: 0.8em; font-weight: bold; color: #777; margin-top: 10px; }
        #pantalla-juego { display: none; background: #FFF; padding: 40px; border-radius: 40px; border: 5px solid var(--fucsia); box-shadow: 0 25px 60px rgba(0,0,0,0.1); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .btn-esc { background: var(--rojo); color: #FFF; border: none; padding: 15px 35px; border-radius: 15px; font-weight: bold; cursor: pointer; font-size: 20px; }
        .box { background: var(--rosa); padding: 30px; border-radius: 25px; margin-bottom: 30px; font-size: 1.5em; font-weight: bold; position: relative; }
        .row { display: grid; grid-template-columns: 140px 1fr 200px; gap: 20px; margin-bottom: 15px; width: 100%; max-width: 900px; margin: auto; }
        input { padding: 20px; border: 3px solid #DDD; border-radius: 15px; text-align: center; font-size: 22px; }
        .btn-val { background: var(--fucsia); color: #FFF; width: 100%; max-width: 900px; padding: 25px; border-radius: 20px; font-size: 1.6em; border: none; font-weight: bold; cursor: pointer; display: block; margin: 40px auto; }
        #game-overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; color: white; }
        .mini-card { background: white; color: #333; padding: 30px; border-radius: 20px; width: 90%; max-width: 500px; text-align: center; }
        .btn-mini { background: var(--fucsia); color: white; border: none; padding: 12px 25px; border-radius: 10px; cursor: pointer; margin: 5px; font-weight: bold; font-size: 18px; }
    </style>
</head>
<body>

<div class="container">
    <div id="menu">
        <h1 style="color: var(--fucsia); font-size: 3.5em;">✨ ContaMaster ✨</h1>
        <div id="selector-trimestres" class="tri-selector">
            <button class="btn-trimestre" onclick="abrirTrimestre(1)">1º TRIMESTRE</button>
            <button class="btn-trimestre" onclick="abrirTrimestre(2)">2º TRIMESTRE</button>
            <button class="btn-trimestre" onclick="abrirTrimestre(3)">3º TRIMESTRE</button>
            <button class="btn-trimestre" onclick="abrirTrimestre(4)">4º TRIMESTRE</button>
        </div>
        <div id="vista-juegos">
            <div class="card">
                <div class="titulo-seccion"><span id="txt-trimestre">TRIMESTRE</span><button class="btn-esc" style="background:#999" onclick="location.reload()">VOLVER</button></div>
                <div class="grid-btns" id="render-botones"></div>
            </div>
        </div>
    </div>

    <div id="pantalla-juego">
        <div class="header"><button class="btn-esc" onclick="cerrarAsiento()">✖️ SALIR</button><div id="timer" style="font-weight:bold; font-size: 2em; color: var(--fucsia);">00:00</div></div>
        <div class="box" id="quest"></div>
        <div class="row">
            <input type="number" id="cd" placeholder="Cód."><input type="text" id="nd" readonly style="background:#f9f9f9"><input type="number" id="id" placeholder="€ Debe">
        </div>
        <div class="row">
            <input type="number" id="ch" placeholder="Cód."><input type="text" id="nh" readonly style="background:#f9f9f9"><input type="number" id="ih" placeholder="€ Haber">
        </div>
        <button class="btn-val" onclick="validarAsiento()">🚀 VALIDAR ASIENTO</button>
    </div>
</div>

<div id="game-overlay"><div class="mini-card" id="mini-cont"></div></div>

<script>
    const PGC = { 100:"Capital Social", 129:"Rtdo. Ejercicio", 210:"Terrenos", 216:"Mobiliario", 217:"Equipos Info", 300:"Mercaderías", 400:"Proveedores", 430:"Clientes", 472:"IVA Sop.", 477:"IVA Rep.", 572:"Bancos", 600:"Compras", 700:"Ventas", 628:"Suministros", 640:"Sueldos" };
    const MODOS = [
        { id:"balance", i:"⚖️", t:"Pesas" }, { id:"iva", i:"🔢", t:"IVA" }, { id:"pgc", i:"🎯", t:"Cód." },
        { id:"salto", i:"🏃", t:"Grupos" }, { id:"memoria", i:"🧩", t:"Act/Pas" }, { id:"fuga", i:"🕳️", t:"Fugas" },
        { id:"puzle", i:"🖼️", t:"Factura" }, { id:"auditor", i:"⚡", t:"V/F" }, { id:"escalera", i:"🪜", t:"G/I" },
        { id:"sopa", i:"🔍", t:"Busca" }, { id:"examen", i:"🏆", t:"EXAMEN" }
    ];

    let triActual = 1, solActual = "", asntSol = {};

    function abrirTrimestre(t) {
        triActual = t;
        document.getElementById('selector-trimestres').style.display = 'none';
        document.getElementById('vista-juegos').style.display = 'block';
        document.getElementById('txt-trimestre').innerText = t + "º TRIMESTRE";
        const r = document.getElementById('render-botones');
        r.innerHTML = "";
        MODOS.forEach(m => r.innerHTML += `<button class="btn-j" onclick="jugar('${m.id}')"><span>${m.i}</span><small>${m.t}</small></button>`);
    }

    function jugar(id) {
        if(id === 'examen') { iniciarAsiento(); return; }
        const ov = document.getElementById('game-overlay');
        const cont = document.getElementById('mini-cont');
        ov.style.display = 'flex';
        cont.innerHTML = "";
        
        const r = (n) => Math.floor(Math.random() * n) + 10;
        const k = Object.keys(PGC);

        switch(id) {
            case 'balance':
                let d = r(1000), h = r(500); solActual = d - h;
                cont.innerHTML = `<h3>Balance</h3><p>Debe: ${d}€ | Haber: ${h}€</p><p>¿Cuanto falta en el Haber?</p><input type="number" id="ans"><button class="btn-mini" onclick="checkM(document.getElementById('ans').value)">OK</button>`;
                break;
            case 'iva':
                let b = r(100) * 10; solActual = b * 0.21;
                cont.innerHTML = `<h3>Calcula IVA</h3><p>Base: ${b}€</p><p>¿IVA (21%)?</p><input type="number" id="ans"><button class="btn-mini" onclick="checkM(document.getElementById('ans').value)">OK</button>`;
                break;
            case 'pgc':
                let c = k[r(k.length-1)]; solActual = c;
                cont.innerHTML = `<h3>¿Código?</h3><p>Cuenta: <b>${PGC[c]}</b></p><input type="number" id="ans"><button class="btn-mini" onclick="checkM(document.getElementById('ans').value)">OK</button>`;
                break;
            case 'salto':
                let s = k[r(k.length-1)]; solActual = s[0];
                cont.innerHTML = `<h3>Grupo PGC</h3><p>¿A qué grupo pertenece <b>${PGC[s]}</b>?</p><input type="number" id="ans"><button class="btn-mini" onclick="checkM(document.getElementById('ans').value)">OK</button>`;
                break;
            case 'memoria':
                let m = [{n:"Bancos",s:"A"},{n:"Proveedores",s:"P"}][r(2)-10]; solActual = m.s;
                cont.innerHTML = `<h3>Clasifica</h3><p><b>${m.n}</b> es...</p><button class="btn-mini" onclick="checkM('A')">ACTIVO</button><button class="btn-mini" onclick="checkM('P')">PASIVO</button>`;
                break;
            case 'fuga':
                let f = r(2000); solActual = f;
                cont.innerHTML = `<h3>Fuga</h3><p>Haber: ${f}€ | Debe: ???</p><p>¿Importe para cuadrar el asiento?</p><input type="number" id="ans"><button class="btn-mini" onclick="checkM(document.getElementById('ans').value)">OK</button>`;
                break;
            case 'puzle':
                let base = r(1000); solActual = base * 1.21;
                cont.innerHTML = `<h3>Total Factura</h3><p>Base: ${base}€ | IVA: 21%</p><p>¿Total?</p><input type="number" id="ans"><button class="btn-mini" onclick="checkM(document.getElementById('ans').value)">OK</button>`;
                break;
            case 'auditor':
                solActual = "V";
                cont.innerHTML = `<h3>V o F</h3><p>¿La cuenta 572 es de Activo?</p><button class="btn-mini" onclick="checkM('V')">V</button><button class="btn-mini" onclick="checkM('F')">F</button>`;
                break;
            case 'escalera':
                solActual = "G";
                cont.innerHTML = `<h3>Gasto o Ingreso</h3><p>La cuenta 600 es un...</p><button class="btn-mini" onclick="checkM('G')">GASTO</button><button class="btn-mini" onclick="checkM('I')">INGRESO</button>`;
                break;
            case 'sopa':
                let n = k[r(k.length-1)]; solActual = n;
                cont.innerHTML = `<h3>Busca</h3><p>Código de <b>${PGC[n]}</b></p><input type="number" id="ans"><button class="btn-mini" onclick="checkM(document.getElementById('ans').value)">OK</button>`;
                break;
        }
    }

    function checkM(v) {
        if(v == solActual) { alert("¡Correcto!"); document.getElementById('game-overlay').style.display='none'; }
        else alert("Error, intenta de nuevo");
    }

    function iniciarAsiento() {
        const op = [{e:"Compra mercaderías",cd:600,ch:572},{e:"Venta mercaderías",cd:572,ch:700}][Math.floor(Math.random()*2)];
        const val = Math.floor(Math.random()*1000)+100;
        asntSol = { ...op, v: val };
        document.getElementById('menu').style.display='none';
        document.getElementById('pantalla-juego').style.display='block';
        document.getElementById('quest').innerText = `${op.e} por ${val}€ al contado.`;
    }

    function validarAsiento() {
        const cd = document.getElementById('cd').value, ch = document.getElementById('ch').value, id = document.getElementById('id').value, ih = document.getElementById('ih').value;
        if(cd == asntSol.cd && ch == asntSol.ch && id == asntSol.v && ih == asntSol.v) { alert("⭐ ¡ASIENTO CORRECTO!"); cerrarAsiento(); }
        else alert("❌ Hay errores en el asiento.");
    }

    function cerrarAsiento() { document.getElementById('menu').style.display='block'; document.getElementById('pantalla-juego').style.display='none'; }
    document.getElementById('cd').oninput = function() { document.getElementById('nd').value = PGC[this.value] || ""; };
    document.getElementById('ch').oninput = function() { document.getElementById('nh').value = PGC[this.value] || ""; };
</script>
</body>
</html>
