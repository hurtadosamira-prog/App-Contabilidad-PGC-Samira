<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>✨ ContaMaster ✨</title>
    <style>
        :root { 
            --fucsia: #D47088; --rosa: #FFF0F5; --rojo: #FF4D4D; --verde: #2E7D32; 
            --azul: #4A90E2; --naranja: #FF9800; --morado: #9C27B0; --teal: #009688;
        }
        body { font-family: 'Segoe UI', sans-serif; background: #F5F5F5; margin: 0; padding: 40px; color: #333; font-size: 20px; }
        .container { max-width: 1400px; margin: auto; }
        #menu { display: block; text-align: center; }
        .tri-selector { display: grid; grid-template-columns: repeat(2, 1fr); gap: 40px; margin-top: 50px; }
        .btn-trimestre { background: #FFF; border: 4px solid var(--fucsia); border-radius: 40px; padding: 80px 20px; font-size: 2.5em; font-weight: bold; color: var(--fucsia); cursor: pointer; transition: 0.3s; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .btn-trimestre:hover { background: var(--fucsia); color: #FFF; transform: translateY(-10px); }
        
        #vista-juegos { display: none; }
        .card { background: #FFF; border: 3px solid #EEE; border-radius: 30px; padding: 25px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); margin-top: 20px; }
        .titulo-seccion { color: var(--fucsia); font-weight: bold; text-align: left; border-left: 8px solid var(--fucsia); padding-left: 15px; margin-bottom: 25px; font-size: 1.8em; display: flex; justify-content: space-between; align-items: center; }
        
        .grid-btns { display: grid; grid-template-columns: repeat(6, 1fr); gap: 15px; }
        .btn-j { background: #FFF; border: 2px solid #DDD; border-radius: 18px; padding: 25px 5px; cursor: pointer; transition: 0.2s; display: flex; flex-direction: column; align-items: center; }
        .btn-j:hover { background: var(--rosa); border-color: var(--fucsia); transform: scale(1.05); }
        .btn-j span { font-size: 2.5em; }
        .btn-j small { font-size: 0.8em; font-weight: bold; color: #777; margin-top: 10px; text-align: center; }

        #pantalla-juego { display: none; background: #FFF; padding: 40px; border-radius: 40px; border: 5px solid var(--fucsia); }
        .box { background: var(--rosa); padding: 30px; border-radius: 25px; margin-bottom: 30px; font-size: 1.5em; font-weight: bold; text-align: center; position: relative; }
        
        .btn-hint { background: #FFEB3B; border: none; border-radius: 50%; width: 50px; height: 50px; font-size: 1.2em; cursor: pointer; position: absolute; right: 20px; top: 20px; }
        .row { display: grid; grid-template-columns: 140px 1fr 200px; gap: 20px; margin-bottom: 15px; width: 100%; max-width: 900px; margin: auto; }
        input { padding: 20px; border: 3px solid #DDD; border-radius: 15px; text-align: center; font-size: 22px; width: 100%; box-sizing: border-box; }
        
        .footer-actions { display: flex; justify-content: center; gap: 10px; max-width: 900px; margin: 20px auto; flex-wrap: wrap; }
        .btn-validar { background: var(--fucsia); color: white; border: none; padding: 20px; border-radius: 20px; font-size: 1.2em; font-weight: bold; cursor: pointer; flex: 2; min-width: 200px; }
        .btn-nodado { background: #eee; color: #666; border: none; padding: 15px 25px; border-radius: 15px; font-size: 1em; font-weight: bold; cursor: pointer; }
        .btn-solucion { background: var(--teal); color: white; border: none; padding: 15px 25px; border-radius: 15px; font-size: 1em; font-weight: bold; cursor: pointer; }

        #game-overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; }
        .modal { background: white; padding: 40px; border-radius: 30px; width: 90%; max-width: 600px; text-align: center; border: 10px solid var(--fucsia); position: relative; }
    </style>
</head>
<body>

<div class="container">
    <div id="menu">
        <h1 style="color: var(--fucsia); font-size: 3.5em;">✨ ContaMaster ✨</h1>
        
        <div id="selector-asignaturas" class="tri-selector">
            <button class="btn-trimestre" onclick="abrirAsignatura('rrhh')" style="font-size: 1.8em;">GESTIÓN DE RRHH</button>
            <button class="btn-trimestre" onclick="abrirAsignatura('logistica')" style="font-size: 1.8em;">GESTIÓN LOGÍSTICA</button>
            <button class="btn-trimestre" onclick="abrirAsignatura('financiera')" style="font-size: 1.8em;">GESTIÓN FINANCIERA</button>
            <button class="btn-trimestre" onclick="abrirContabilidad()" style="font-size: 1.8em;">CONTABILIDAD Y FISC.</button>
        </div>

        <div id="selector-trimestres" class="tri-selector" style="display: none;">
            <button class="btn-trimestre" onclick="abrirTrimestre(1)">1º TRIMESTRE</button>
            <button class="btn-trimestre" onclick="abrirTrimestre(2)">2º TRIMESTRE</button>
            <button class="btn-trimestre" onclick="abrirTrimestre(3)">3º TRIMESTRE</button>
            <button class="btn-trimestre" onclick="abrirTrimestre(4)">4º TRIMESTRE</button>
            <button class="btn-trimestre" onclick="volverAInicio()" style="background: #999; color: white; font-size: 1.5em; border-color: #999;">⬅ VOLVER</button>
        </div>

        <div id="vista-juegos">
            <div class="card">
                <div class="titulo-seccion">
                    <span id="txt-trimestre">SECCIÓN</span>
                    <button onclick="volverAInicio()" style="background:#999; color:white; border:none; padding:8px 15px; border-radius:8px; cursor:pointer; font-size:0.5em;">VOLVER AL INICIO</button>
                </div>
                <div class="grid-btns" id="render-botones"></div>
            </div>
        </div>
    </div>

    <div id="pantalla-juego">
        <div class="box">
            <button class="btn-hint" onclick="darPista()">💡</button>
            <div id="quest"></div>
        </div>
        <div id="area">
            <div class="row">
                <input type="number" id="cd" placeholder="Cod." oninput="updateName(this, 'nd')">
                <input type="text" id="nd" readonly style="background:#eee;" placeholder="Cuenta...">
                <input type="number" id="id" placeholder="€ Debe">
            </div>
            <div style="text-align:center; font-weight:bold; color:var(--fucsia); margin:10px;">A</div>
            <div class="row">
                <input type="number" id="ch" placeholder="Cod." oninput="updateName(this, 'nh')">
                <input type="text" id="nh" readonly style="background:#eee;" placeholder="Cuenta...">
                <input type="number" id="ih" placeholder="€ Haber">
            </div>
            <div class="footer-actions">
                <button class="btn-nodado" onclick="noDado()">NO DADO</button>
                <button class="btn-solucion" onclick="verSolucion()">SOLUCIÓN</button>
                <button class="btn-validar" onclick="checkAsiento()">🚀 VALIDAR ASIENTO</button>
            </div>
            <button class="btn-nodado" style="width:100%; background:var(--rojo); color:white; margin-top:10px;" onclick="cerrarJuego()">SALIR</button>
        </div>
    </div>
</div>

<div id="game-overlay">
    <div class="modal" id="modal-color">
        <button class="btn-hint" onclick="darPista()">💡</button>
        <h2 id="m-titulo"></h2>
        <div id="m-pregunta" style="font-size: 1.4em; margin: 20px 0; font-weight: bold;"></div>
        <div id="m-input-area"></div>
        <div class="footer-actions">
            <button class="btn-nodado" onclick="noDado()">NO DADO</button>
            <button class="btn-solucion" onclick="verSolucion()">SOLUCIÓN</button>
            <button class="btn-validar" id="m-btn-validar">VALIDAR</button>
        </div>
        <button onclick="document.getElementById('game-overlay').style.display='none'" style="margin-top:20px; background:none; border:none; color:#999; text-decoration:underline; cursor:pointer;">Cerrar</button>
    </div>
</div>

<script>
    const PGC_DATA = {
        1: {572:"Bancos c/c", 570:"Caja, €", 430:"Clientes", 400:"Proveedores", 600:"Compras de mercaderías", 700:"Ventas de mercaderías", 472:"H.P., IVA soportado", 477:"H.P., IVA repercutido"},
        2: {216:"Mobiliario", 640:"Sueldos y salarios", 4751:"H.P., acreedora por retenciones practicadas", 4720:"H.P., IVA soportado (Intracom.)", 4770:"H.P., IVA repercutido (Intracom.)", 4721:"H.P., IVA soportado (Importaciones)"},
        3: {300:"Mercaderías", 610:"Variación de existencias de mercaderías", 480:"Gastos anticipados", 485:"Ingresos anticipados", 129:"Resultado del ejercicio", 628:"Suministros"},
        4: {281:"Amort. acumulada del inmovilizado material", 681:"Amortización del inmovilizado material", 4700:"H.P., deudora por IVA", 4750:"H.P., acreedora por IVA", 490:"Deterioro de valor de créditos comerciales", 794:"Reversión del deterioro de créditos comerciales"}
    };

    let triActual = 4, lastId = "", currentAns = "", targetAsiento = null;

    function getPGCActual() {
        let p = {};
        for(let i=1; i<=triActual; i++) Object.assign(p, PGC_DATA[i]);
        return p;
    }

    const ASIGNATURAS = {
        'rrhh': { titulo: "GESTIÓN DE RRHH", juegos: [
            {id:"finiquito", i:"🤝", t:"Finiquito"}, {id:"embargo", i:"💼", t:"Embargo"},
            {id:"ss_obrera", i:"📉", t:"SS Obrera"}, {id:"ss_empresa", i:"🏢", t:"SS Empresa"},
            {id:"irpf", i:"🏛️", t:"IRPF Base"}, {id:"horas_extra", i:"⏱️", t:"Horas Ext."},
            {id:"despido_imp", i:"⚖️", t:"D. Improc."}, {id:"it_enferm", i:"🤒", t:"Baja IT"},
            {id:"vacaciones", i:"🏖️", t:"Vacaciones"}, {id:"coste_emp", i:"💰", t:"Coste Total"}
        ]},
        'logistica': { titulo: "GESTIÓN LOGÍSTICA", juegos: [
            {id:"pmp", i:"📦", t:"PMP"}, {id:"fifo", i:"🛒", t:"FIFO"},
            {id:"pto_pedido", i:"📐", t:"Pto. Pedido"}, {id:"stock_seg", i:"🛡️", t:"Stock Seg."},
            {id:"rotacion", i:"🔄", t:"Rotación"}, {id:"dias_vta", i:"📅", t:"Días Vta."},
            {id:"almacenaje", i:"🏭", t:"Coste Alm."}, {id:"dto_com", i:"🏷️", t:"Dto. Com."},
            {id:"rotura", i:"⚠️", t:"Coste Rotura"}, {id:"lote_wilson", i:"🎯", t:"Lote Ópt."}
        ]},
        'financiera': { titulo: "GESTIÓN FINANCIERA", juegos: [
            {id:"remesa", i:"🏦", t:"Remesa"}, {id:"interes", i:"📈", t:"Int. Simple"},
            {id:"int_comp", i:"📊", t:"Int. Comp."}, {id:"dto_efect", i:"🧾", t:"Dto. Efect."},
            {id:"roe", i:"🏭", t:"ROE (%)"}, {id:"roa", i:"💼", t:"ROA (%)"},
            {id:"liquidez", i:"💧", t:"R. Liquidez"}, {id:"fm", i:"🧱", t:"F. Maniobra"},
            {id:"tae", i:"% ", t:"TAE (%)"}, {id:"prestamo", i:"💳", t:"C. Préstamo"}
        ]}
    };

    const CONTA_TRIMESTRES = {
        1: [{id:"iva_liq", i:"⚖️", t:"Liquid. IVA"}, {id:"dto_fra", i:"🧾", t:"Dto. Fra."}],
        2: [{id:"prorrata", i:"% ", t:"Prorrata"}, {id:"deterioro", i:"📉", t:"Deterioro"}, {id:"amort", i:"⏳", t:"Amortiz."}],
        3: [{id:"subvencion", i:"🏛️", t:"Subvención"}, {id:"vta_inmov", i:"🏗️", t:"Vta. Inmov."}, {id:"efecto_imp", i:"❌", t:"Efecto Imp."}],
        4: [{id:"isoc_avanzado", i:"🏢", t:"ISOC"}, {id:"examen", i:"🏆", t:"Diario"}]
    };

    function abrirAsignatura(asig) {
        triActual = 4;
        document.getElementById('selector-asignaturas').style.display = 'none';
        document.getElementById('selector-trimestres').style.display = 'none';
        document.getElementById('vista-juegos').style.display = 'block';
        document.getElementById('txt-trimestre').innerText = ASIGNATURAS[asig].titulo;
        
        const grid = document.getElementById('render-botones');
        grid.innerHTML = "";
        ASIGNATURAS[asig].juegos.forEach(m => grid.innerHTML += `<button class="btn-j" onclick="lanzar('${m.id}')"><span>${m.i}</span><small>${m.t}</small></button>`);
    }

    function abrirContabilidad() {
        document.getElementById('selector-asignaturas').style.display = 'none';
        document.getElementById('selector-trimestres').style.display = 'grid';
        document.getElementById('vista-juegos').style.display = 'none';
    }

    function abrirTrimestre(n) {
        triActual = n;
        document.getElementById('selector-trimestres').style.display = 'none';
        document.getElementById('vista-juegos').style.display = 'block';
        document.getElementById('txt-trimestre').innerText = "CONTABILIDAD - " + n + "º TRIMESTRE";
        
        const grid = document.getElementById('render-botones');
        grid.innerHTML = "";
        (CONTA_TRIMESTRES[n] || []).forEach(m => grid.innerHTML += `<button class="btn-j" onclick="lanzar('${m.id}')"><span>${m.i}</span><small>${m.t}</small></button>`);
    }

    function volverAInicio() {
        document.getElementById('selector-asignaturas').style.display = 'grid';
        document.getElementById('selector-trimestres').style.display = 'none';
        document.getElementById('vista-juegos').style.display = 'none';
    }

    function lanzar(id) {
        lastId = id;
        if(id === 'examen') return generarExamen();
        
        let esConta = ['iva_liq', 'dto_fra', 'prorrata', 'deterioro', 'amort', 'subvencion', 'vta_inmov', 'efecto_imp', 'isoc_avanzado'].includes(id);
        document.getElementById('m-titulo').innerText = (esConta ? "T" + triActual + " - " : "") + "CASO: " + id.toUpperCase();
        
        document.getElementById('game-overlay').style.display = 'flex';
        document.getElementById('m-btn-validar').onclick = () => validarMini(document.getElementById('ans').value);
        generarPregunta();
    }

    function generarPregunta() {
        const p = document.getElementById('m-pregunta');
        const a = document.getElementById('m-input-area');
        let styleInp = 'style="width:100%; padding:20px; border-radius:15px; border:2px solid #ddd; font-size:1.5em; text-align:center;"';

        // Variables globales para evitar colapsos de scope en el switch
        let salDia, anos, smi, exceso, base, tipo, horas, precio, baseDia, meses, bruto, ssEmp;
        let q1, p1, q2, p2, ent1, ent2, demDia, plazo, ss, demMax, demMedia, coste, medio, rot, q, cu, dto, perdidas, margen, k, s_val, h;
        let nom, gas, cap, i_val, dias, bdi, pn, baii, act, ac, pc, rep, sop, com, fin, opConDed, opSinDed, vnr, vAdq, vRes, vida, subTotal, vidaU, vVenta, amort, gastos, bi, retenciones;

        switch(lastId) {
            // --- GESTIÓN RRHH ---
            case 'finiquito': 
                salDia = Math.floor(Math.random()*40) + 40; anos = Math.floor(Math.random()*5) + 1;
                currentAns = salDia * 20 * anos;
                p.innerText = `Despido objetivo (20 días/año). Antigüedad: ${anos} años. Salario diario: ${salDia}€.`;
                a.innerHTML = `<p>Indemnización a abonar:</p><input type="number" id="ans" autofocus ${styleInp}>`;
                break;
            case 'embargo': 
                smi = 1134; exceso = Math.floor(Math.random()*400) + 100;
                currentAns = Math.round(exceso * 0.30);
                p.innerText = `Trabajador cobra ${smi + exceso}€ netos. SMI (${smi}€) es inembargable. Embargo del 30% sobre el exceso.`;
                a.innerHTML = `<p>Retención en euros:</p><input type="number" id="ans" autofocus ${styleInp}>`;
                break;
            case 'ss_obrera': 
                base = Math.floor(Math.random()*10)*100 + 1000;
                currentAns = Math.round(base * 0.0635);
                p.innerText = `Base Cotización (BCCC y BCCP): ${base}€. Tipos: CC(4.7%), Desempleo(1.55%), FP(0.1%).`;
                a.innerHTML = `<p>Total deducción Seguridad Social del trabajador:</p><input type="number" id="ans" autofocus ${styleInp}>`;
                break;
            case 'ss_empresa': 
                base = Math.floor(Math.random()*10)*100 + 1000;
                currentAns = Math.round(base * 0.314);
                p.innerText = `Base Cotización: ${base}€. Tipo global empresa aprox: 31.4%.`;
                a.innerHTML = `<p>Coste Seg. Social a cargo de la empresa (aprox):</p><input type="number" id="ans" autofocus ${styleInp}>`;
                break;
            case 'irpf': 
                base = Math.floor(Math.random()*10)*100 + 1000; tipo = Math.floor(Math.random()*10) + 5;
                currentAns = Math.round(base * (tipo/100));
                p.innerText = `Salario Bruto sujeto a retención: ${base}€. Tipo IRPF: ${tipo}%.`;
                a.innerHTML = `<p>Importe a retener por IRPF:</p><input type="number" id="ans" autofocus ${styleInp}>`;
                break;
            case 'horas_extra': 
                horas = Math.floor(Math.random()*10) + 2; precio = Math.floor(Math.random()*10) + 10;
                currentAns = horas * precio;
                p.innerText = `El empleado realiza ${horas} horas extras de fuerza mayor a ${precio}€/hora.`;
                a.innerHTML = `<p>Importe bruto de las horas extra:</p><input type="number" id="ans" autofocus ${styleInp}>`;
                break;
            case 'despido_imp': 
                salDia = Math.floor(Math.random()*30) + 50; anos = Math.floor(Math.random()*5) + 1;
                currentAns = salDia * 33 * anos;
                p.innerText = `Despido improcedente actual (33 días/año). Antigüedad exacta: ${anos} años. Salario diario: ${salDia}€.`;
                a.innerHTML = `<p>Indemnización a abonar:</p><input type="number" id="ans" autofocus ${styleInp}>`;
                break;
            case 'it_enferm': 
                baseDia = Math.floor(Math.random()*20) + 40;
                currentAns = Math.round(baseDia * 0.60 * 12); 
                p.innerText = `Baja por enfermedad común de 15 días exactos. Base Reguladora: ${baseDia}€/día. (Días 1-3 al 0%, Días 4-15 al 60%).`;
                a.innerHTML = `<p>Importe total de la prestación a abonar en esos 15 días:</p><input type="number" id="ans" autofocus ${styleInp}>`;
                break;
            case 'vacaciones': 
                meses = Math.floor(Math.random()*8) + 1;
                currentAns = Math.floor(meses * 2.5);
                p.innerText = `Generación de 2.5 días/mes. El trabajador lleva en la empresa ${meses} meses.`;
                a.innerHTML = `<p>Días de vacaciones generados (sin decimales):</p><input type="number" id="ans" autofocus ${styleInp}>`;
                break;
            case 'coste_emp': 
                bruto = Math.floor(Math.random()*10)*100 + 1000; ssEmp = Math.floor(Math.random()*100) + 400;
                currentAns = bruto + ssEmp;
                p.innerText = `Salario Bruto (Devengos): ${bruto}€. Seg. Social a cargo de la Empresa: ${ssEmp}€.`;
                a.innerHTML = `<p>Coste total del trabajador para la empresa:</p><input type="number" id="ans" autofocus ${styleInp}>`;
                break;

            // --- GESTIÓN LOGÍSTICA ---
            case 'pmp': 
                q1 = 100; p1 = 10; q2 = 100; p2 = 15;
                currentAns = ((q1 * p1) + (q2 * p2)) / (q1 + q2);
                p.innerText = `Stock inicial: ${q1} uds a ${p1}€. Entrada: ${q2} uds a ${p2}€.`;
                a.innerHTML = `<p>Calcula el PMP:</p><input type="number" step="0.01" id="ans" autofocus ${styleInp}>`;
                break;
            case 'fifo': 
                ent1 = 10; p1 = 10; ent2 = 20; p2 = 12;
                currentAns = (ent1+ent2-25)*p2; 
                p.innerText = `Entrada 1: ${ent1}uds a ${p1}€. Entrada 2: ${ent2}uds a ${p2}€. Se venden 25 uds (Método FIFO).`;
                a.innerHTML = `<p>Valor del stock final restante:</p><input type="number" id="ans" autofocus ${styleInp}>`;
                break;
            case 'pto_pedido': 
                demDia = Math.floor(Math.random()*5) + 5; plazo = Math.floor(Math.random()*5) + 2; ss = Math.floor(Math.random()*10) + 10;
                currentAns = (demDia * plazo) + ss;
                p.innerText = `Demanda diaria: ${demDia} uds. Plazo de entrega: ${plazo} días. Stock de Seguridad: ${ss} uds.`;
                a.innerHTML = `<p>Punto de Pedido (Volumen en el que hay que pedir):</p><input type="number" id="ans" autofocus ${styleInp}>`;
                break;
            case 'stock_seg': 
                demMax = Math.floor(Math.random()*5) + 15; demMedia = demMax - 5; plazo = 3;
                currentAns = (demMax - demMedia) * plazo;
                p.innerText = `Demanda máxima: ${demMax} uds/día. Demanda normal: ${demMedia} uds/día. Retraso o plazo entrega: ${plazo} días.`;
                a.innerHTML = `<p>Stock de Seguridad recomendado:</p><input type="number" id="ans" autofocus ${styleInp}>`;
                break;
            case 'rotacion': 
                coste = Math.floor(Math.random()*5)*1000 + 5000; medio = Math.floor(Math.random()*2)*500 + 1000;
                currentAns = coste / medio;
                p.innerText = `Coste de las ventas anuales: ${coste}€. Valor medio del inventario: ${medio}€.`;
                a.innerHTML = `<p>Índice de Rotación (veces):</p><input type="number" id="ans" autofocus ${styleInp}>`;
                break;
            case 'dias_vta': 
                rot = Math.floor(Math.random()*5) + 2;
                currentAns = Math.round(365 / rot);
                p.innerText = `El índice de rotación de tu almacén es de ${rot} veces al año.`;
                a.innerHTML = `<p>Periodo Medio de Venta en días (redondeado):</p><input type="number" id="ans" autofocus ${styleInp}>`;
                break;
            case 'almacenaje': 
                q = Math.floor(Math.random()*100) + 100; ss = 20; cu = Math.floor(Math.random()*5) + 2;
                currentAns = ((q/2) + ss) * cu;
                p.innerText = `Volumen de pedido (Q): ${q}. Stock Seguridad: ${ss}. Coste unitario almacenaje: ${cu}€. Fórmula: (Q/2 + SS)*Cu.`;
                a.innerHTML = `<p>Coste total de almacenaje:</p><input type="number" id="ans" autofocus ${styleInp}>`;
                break;
            case 'dto_com': 
                bruto = Math.floor(Math.random()*5)*1000 + 2000; dto = Math.floor(Math.random()*10) + 5;
                currentAns = bruto * (1 - (dto/100));
                p.innerText = `Importe bruto del pedido: ${bruto}€. Descuento comercial en factura: ${dto}%.`;
                a.innerHTML = `<p>Importe neto a pagar:</p><input type="number" id="ans" autofocus ${styleInp}>`;
                break;
            case 'rotura': 
                perdidas = Math.floor(Math.random()*50) + 20; margen = Math.floor(Math.random()*10) + 5;
                currentAns = perdidas * margen;
                p.innerText = `Por no tener stock se pierden ${perdidas} ventas. Margen de beneficio unitario: ${margen}€.`;
                a.innerHTML = `<p>Coste total de rotura de stock:</p><input type="number" id="ans" autofocus ${styleInp}>`;
                break;
            case 'lote_wilson': 
                k = 1000; s_val = 10; h = 5; 
                currentAns = Math.round(Math.sqrt((2 * k * s_val) / h));
                p.innerText = `Demanda(D): ${k}. Coste Emisión Pedido(S): ${s_val}€. Coste Posesión unit(H): ${h}€. Fórmula Raíz Cuadrada(2*D*S / H).`;
                a.innerHTML = `<p>Lote Económico de Pedido (Q óptima redondeada):</p><input type="number" id="ans" autofocus ${styleInp}>`;
                break;

            // --- GESTIÓN FINANCIERA ---
            case 'remesa': 
                nom = 3000; gas = 50; dto = 100;
                currentAns = nom - dto - gas;
                p.innerText = `Pagaré al descuento. Nominal: ${nom}€. Intereses Dto: ${dto}€. Comisiones: ${gas}€.`;
                a.innerHTML = `<p>Efectivo líquido a ingresar:</p><input type="number" id="ans" autofocus ${styleInp}>`;
                break;
            case 'interes': 
                cap = 5000; i_val = 5;
                currentAns = cap * (i_val/100);
                p.innerText = `Inversión: ${cap}€. Interés simple anual: ${i_val}%. 1 año.`;
                a.innerHTML = `<p>Beneficio por intereses (euros):</p><input type="number" id="ans" autofocus ${styleInp}>`;
                break;
            case 'int_comp': 
                cap = 1000; i_val = 10; 
                currentAns = Math.round(cap * 1.10 * 1.10); 
                p.innerText = `Capital inicial: ${cap}€. Interés compuesto anual: ${i_val}%. Periodo: 2 años.`;
                a.innerHTML = `<p>Capital final (Montante):</p><input type="number" id="ans" autofocus ${styleInp}>`;
                break;
            case 'dto_efect': 
                nom = 10000; dto = 5; dias = 72; 
                currentAns = nom * (dto/100) * (dias/360);
                p.innerText = `Efecto comercial. Nominal: ${nom}€. Dto: ${dto}%. Días anticipo: ${dias} (Año 360).`;
                a.innerHTML = `<p>Importe del descuento comercial (euros):</p><input type="number" id="ans" autofocus ${styleInp}>`;
                break;
            case 'roe': 
                bdi = Math.floor(Math.random()*10)*1000 + 5000; pn = bdi * 4;
                currentAns = Math.round((bdi / pn) * 100);
                p.innerText = `Beneficio Neto (BDI): ${bdi}€. Patrimonio Neto (Recursos Propios): ${pn}€.`;
                a.innerHTML = `<p>Rentabilidad Financiera (ROE en %):</p><input type="number" id="ans" autofocus ${styleInp}>`;
                break;
            case 'roa': 
                baii = Math.floor(Math.random()*10)*1000 + 5000; act = baii * 10;
                currentAns = Math.round((baii / act) * 100);
                p.innerText = `Beneficio Antes de Intereses e Impuestos (BAII): ${baii}€. Activo Total: ${act}€.`;
                a.innerHTML = `<p>Rentabilidad Económica (ROA en %):</p><input type="number" id="ans" autofocus ${styleInp}>`;
                break;
            case 'liquidez': 
                ac = 4000; pc = 2000;
                currentAns = ac / pc;
                p.innerText = `Activo Corriente: ${ac}€. Pasivo Corriente: ${pc}€.`;
                a.innerHTML = `<p>Ratio de Liquidez General:</p><input type="number" id="ans" step="0.01" autofocus ${styleInp}>`;
                break;
            case 'fm': 
                ac = Math.floor(Math.random()*5)*1000 + 5000; pc = ac - 2000;
                currentAns = ac - pc;
                p.innerText = `Activo Corriente: ${ac}€. Pasivo Corriente: ${pc}€.`;
                a.innerHTML = `<p>Fondo de Maniobra:</p><input type="number" id="ans" autofocus ${styleInp}>`;
                break;
            case 'tae': 
                currentAns = 10.25; 
                p.innerText = `Préstamo con interés nominal (TIN) del 10% capitalizable semestralmente (2 periodos/año). Fórm: (1+i/k)^k - 1`;
                a.innerHTML = `<p>Calcula la TAE en % (Ej: 10.25):</p><input type="number" step="0.01" id="ans" autofocus ${styleInp}>`;
                break;
            case 'prestamo': 
                cap = 10000; i_val = 5;
                currentAns = cap + (cap*(i_val/100));
                p.innerText = `Préstamo de ${cap}€ a devolver en 1 solo pago anual al ${i_val}% de interés.`;
                a.innerHTML = `<p>Cuota única a devolver (Principal + Intereses):</p><input type="number" id="ans" autofocus ${styleInp}>`;
                break;

            // --- CONTABILIDAD ---
            case 'iva_liq': 
                rep = Math.floor(Math.random()*1000) + 2000; sop = Math.floor(Math.random()*1000) + 500;
                currentAns = rep - sop;
                p.innerText = `Trimestre 1. IVA Repercutido (Devengado): ${rep}€. IVA Soportado (Deducible): ${sop}€.`;
                a.innerHTML = `<p>Resultado Liquidación (A ingresar H.P.):</p><input type="number" id="ans" autofocus ${styleInp}>`;
                break;
            case 'dto_fra': 
                base = 1000; com = 10; fin = 5;
                currentAns = (base * (1 - com/100)) * (1 - fin/100);
                p.innerText = `Importe bruto mercancía: ${base}€. Dto comercial: ${com}%. Dto por pronto pago: ${fin}%. (Casada).`;
                a.innerHTML = `<p>Base Imponible final en Factura:</p><input type="number" id="ans" autofocus ${styleInp}>`;
                break;
            case 'prorrata': 
                opConDed = 20000; opSinDed = 10000;
                currentAns = Math.round((opConDed / (opConDed+opSinDed)) * 100);
                p.innerText = `Operaciones con derecho deducción: ${opConDed}€. Sin derecho: ${opSinDed}€.`;
                a.innerHTML = `<p>Prorrata General de IVA (%):</p><input type="number" id="ans" autofocus ${styleInp}>`;
                break;
            case 'deterioro': 
                coste = 5000; vnr = 4000;
                currentAns = coste - vnr;
                p.innerText = `Mercaderías. Valor contable: ${coste}€. Valor Neto Realizable (Mercado): ${vnr}€.`;
                a.innerHTML = `<p>Dotación por deterioro a registrar:</p><input type="number" id="ans" autofocus ${styleInp}>`;
                break;
            case 'amort': 
                vAdq = 12000; vRes = 2000; vida = 5;
                currentAns = (vAdq - vRes) / vida;
                p.innerText = `Vehículo. Precio adq: ${vAdq}€. Valor residual: ${vRes}€. Vida útil: ${vida} años.`;
                a.innerHTML = `<p>Cuota de Amortización Lineal anual:</p><input type="number" id="ans" autofocus ${styleInp}>`;
                break;
            case 'subvencion': 
                subTotal = 10000; vidaU = 5;
                currentAns = subTotal / vidaU;
                p.innerText = `Subvención de capital de ${subTotal}€ para máquina que se amortiza en ${vidaU} años.`;
                a.innerHTML = `<p>Importe a traspasar a resultados (cuenta 746) este año:</p><input type="number" id="ans" autofocus ${styleInp}>`;
                break;
            case 'vta_inmov': 
                vVenta = 5000; vAdq = 10000; amort = 6000;
                currentAns = vVenta - (vAdq - amort);
                p.innerText = `Venta maquinaria por ${vVenta}€. Valor de adquisición era ${vAdq}€ y su Amortización Acumulada ${amort}€.`;
                a.innerHTML = `<p>Beneficio contable de la venta (cuenta 771):</p><input type="number" id="ans" autofocus ${styleInp}>`;
                break;
            case 'efecto_imp': 
                nom = 2000; gastos = 75;
                currentAns = nom + gastos;
                p.innerText = `El cliente no paga su letra de ${nom}€. El banco te cobra ${gastos}€ de gastos de protesto.`;
                a.innerHTML = `<p>Deuda total que le reclamarás al cliente:</p><input type="number" id="ans" autofocus ${styleInp}>`;
                break;
            case 'isoc_avanzado': 
                bi = 20000; retenciones = 1500;
                currentAns = (bi * 0.25) - retenciones;
                p.innerText = `Base Imponible Impuesto Sociedades: ${bi}€ (Tipo 25%). Retenciones soportadas: ${retenciones}€.`;
                a.innerHTML = `<p>Cuota Diferencial a ingresar:</p><input type="number" id="ans" autofocus ${styleInp}>`;
                break;
        }
    }

    function darPista() { alert("Pista: Empieza o contiene un " + currentAns.toString()[0]); }
    function noDado() { alert("Saltando al siguiente..."); if(lastId === 'examen') generarExamen(); else generarPregunta(); }

    function verSolucion() {
        if(lastId === 'examen') {
            alert(`Solución Asiento:\nDebe: ${targetAsiento.cd} (${targetAsiento.v}€)\nHaber: ${targetAsiento.ch} (${targetAsiento.v}€)`);
        } else {
            alert(`La respuesta correcta es: ${currentAns}`);
        }
    }

    function validarMini(v) {
        if(v.toString().toUpperCase() == currentAns.toString().toUpperCase()) { alert("¡Correcto!"); generarPregunta(); }
        else { alert("Incorrecto, revisa tus cálculos."); }
    }

    function generarExamen() {
        const operaciones = [
            {q:"Autorrepercusión de IVA por Adquisición Intracomunitaria", cd:4720, ch:4770},
            {q:"Dotación anual a la amortización del inmovilizado material", cd:681, ch:281},
            {q:"Imputación a resultados de Gastos anticipados del ejercicio anterior", cd:628, ch:480},
            {q:"Asiento de Regularización: Cierre de la cuenta de Ventas contra Rtdo. Ejercicio", cd:700, ch:129},
            {q:"Asiento de Regularización: Cierre de la cuenta de Compras contra Rtdo. Ejercicio", cd:129, ch:600},
            {q:"Variación Existencias: Dar de baja las existencias iniciales", cd:610, ch:300},
            {q:"Variación Existencias: Reconocer las existencias finales", cd:300, ch:610},
            {q:"Reconocimiento de reversión deterioro de créditos", cd:490, ch:794},
            {q:"Pago de la liquidación del IVA a Hacienda por banco", cd:4750, ch:572},
            {q:"Cobro de la devolución del IVA de Hacienda por banco", cd:572, ch:4700},
            {q:"Cobro de factura a clientes por banco", cd:572, ch:430},
            {q:"Pago de deuda a proveedores por banco", cd:400, ch:572},
            {q:"Imputación de Ingresos anticipados del ejercicio anterior", cd:485, ch:700}
        ];
        
        let s = operaciones[Math.floor(Math.random()*operaciones.length)];
        let v = Math.floor(Math.random()*9500)+500;
        targetAsiento = { cd:s.cd, ch:s.ch, v:v };
        
        document.getElementById('menu').style.display = 'none';
        document.getElementById('pantalla-juego').style.display = 'block';
        document.getElementById('quest').innerText = `Diario T${triActual}:\n${s.q} por ${targetAsiento.v}€`;
        clearInp();
    }

    function checkAsiento() {
        if(document.getElementById('cd').value == targetAsiento.cd && document.getElementById('ch').value == targetAsiento.ch && document.getElementById('id').value == targetAsiento.v) {
            alert("¡Asiento correcto y cuadrado según PGC!"); generarExamen();
        } else { alert("Error en los códigos del asiento o en los importes."); }
    }

    function updateName(el, targetId) { document.getElementById(targetId).value = getPGCActual()[el.value] || ""; }
    function cerrarJuego() { document.getElementById('menu').style.display = 'block'; document.getElementById('pantalla-juego').style.display = 'none'; }
    function clearInp() { document.querySelectorAll('#pantalla-juego input').forEach(i => i.value = ""); }
</script>
</body>
