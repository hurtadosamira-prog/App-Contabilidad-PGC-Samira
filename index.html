<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>✨ ContaMaster Pro ✨</title>
    <style>
        :root { --fucsia: #D47088; --rosa: #FFF0F5; --rojo: #FF4D4D; --verde: #2E7D32; --azul: #4A90E2; }
        body { font-family: 'Segoe UI', sans-serif; background: #F5F5F5; margin: 0; padding: 40px; color: #333; font-size: 20px; }
        .container { max-width: 1400px; margin: auto; }
        #menu { display: block; text-align: center; }
        .tri-selector { display: grid; grid-template-columns: repeat(2, 1fr); gap: 40px; margin-top: 50px; }
        .btn-trimestre { background: #FFF; border: 4px solid var(--fucsia); border-radius: 40px; padding: 80px 20px; font-size: 2.5em; font-weight: bold; color: var(--fucsia); cursor: pointer; transition: 0.3s; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .btn-trimestre:hover { background: var(--fucsia); color: #FFF; transform: translateY(-10px); }
        #vista-juegos { display: none; }
        .card { background: #FFF; border: 3px solid #EEE; border-radius: 30px; padding: 25px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); margin-top: 20px; }
        .titulo-seccion { color: var(--fucsia); font-weight: bold; text-align: left; border-left: 8px solid var(--fucsia); padding-left: 15px; margin-bottom: 25px; font-size: 1.8em; display: flex; justify-content: space-between; align-items: center; }
        .grid-btns { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; }
        .btn-j { background: #FFF; border: 2px solid #DDD; border-radius: 18px; padding: 25px 5px; cursor: pointer; transition: 0.2s; display: flex; flex-direction: column; align-items: center; }
        .btn-j:hover { background: var(--rosa); border-color: var(--fucsia); transform: scale(1.05); }
        .btn-j span { font-size: 2.5em; }
        .btn-j small { font-size: 0.9em; font-weight: bold; color: #777; margin-top: 10px; }
        #pantalla-juego { display: none; background: #FFF; padding: 40px; border-radius: 40px; border: 5px solid var(--fucsia); box-shadow: 0 25px 60px rgba(0,0,0,0.1); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .btn-esc { background: var(--rojo); color: #FFF; border: none; padding: 15px 35px; border-radius: 15px; font-weight: bold; cursor: pointer; font-size: 20px; }
        .box { background: var(--rosa); padding: 30px; border-radius: 25px; margin-bottom: 30px; font-size: 1.5em; font-weight: bold; }
        .row { display: grid; grid-template-columns: 140px 1fr 200px; gap: 20px; margin-bottom: 15px; width: 100%; max-width: 900px; margin: auto; }
        input { padding: 20px; border: 3px solid #DDD; border-radius: 15px; text-align: center; font-size: 22px; width: 100%; box-sizing: border-box; }
        .cta-name { background: #F5F5F5; border: none; color: var(--fucsia); font-weight: bold; text-align: left; padding-left: 20px; font-size: 22px; }
        .btn-val { background: var(--fucsia); color: #FFF; width: 100%; max-width: 900px; padding: 25px; border-radius: 20px; font-size: 1.6em; border: none; font-weight: bold; cursor: pointer; display: block; margin: 40px auto; }
        #msg { margin-top: 25px; padding: 20px; border-radius: 20px; text-align: center; display: none; font-weight: bold; font-size: 22px; }
        #game-overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; color: white; }
        .modal { background: white; color: #333; padding: 40px; border-radius: 30px; width: 90%; max-width: 650px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <div id="menu">
        <h1 style="color: var(--fucsia); font-size: 3.5em; margin-bottom: 10px;">✨ ContaMaster ✨</h1>
        <div id="selector-trimestres" class="tri-selector">
            <button class="btn-trimestre" onclick="abrirTrimestre(0)">1º TRIMESTRE</button>
            <button class="btn-trimestre" onclick="abrirTrimestre(1)">2º TRIMESTRE</button>
            <button class="btn-trimestre" onclick="abrirTrimestre(2)">3º TRIMESTRE</button>
            <button class="btn-trimestre" onclick="abrirTrimestre(3)">4º TRIMESTRE</button>
        </div>
        <div id="vista-juegos">
            <div class="card">
                <div class="titulo-seccion">
                    <span id="txt-trimestre">TRIMESTRE</span>
                    <button class="btn-esc" style="background: #999;" onclick="volverAInicio()">ATRÁS</button>
                </div>
                <div class="grid-btns" id="render-botones"></div>
            </div>
        </div>
    </div>

    <div id="pantalla-juego">
        <div class="header">
            <button class="btn-esc" onclick="cerrarJuego()">✖️ SALIR</button>
            <div style="font-weight:bold; color:var(--fucsia); font-size: 1.6em;">MODO EXAMEN</div>
            <div id="timer" style="font-weight:bold; font-size: 2.5em; color: var(--fucsia);">00:00</div>
        </div>
        <div class="box"><div id="quest"></div></div>
        <div id="area">
            <div class="row">
                <input type="number" id="cd" placeholder="Código" oninput="updateName(this, 'nd')">
                <input type="text" id="nd" class="cta-name" readonly placeholder="Cuenta...">
                <input type="number" id="id" placeholder="€ Debe">
            </div>
            <div style="text-align:center; font-weight:bold; color:var(--fucsia); margin:15px; font-size: 1.5em;">A</div>
            <div class="row">
                <input type="number" id="ch" placeholder="Código" oninput="updateName(this, 'nh')">
                <input type="text" id="nh" class="cta-name" readonly placeholder="Cuenta...">
                <input type="number" id="ih" placeholder="€ Haber">
            </div>
            <button class="btn-val" onclick="checkAsiento()">🚀 VALIDAR ASIENTO</button>
        </div>
        <div id="msg"></div>
    </div>
</div>

<div id="game-overlay">
    <div class="modal">
        <h2 id="m-title" style="color: var(--fucsia); font-size: 2em; margin-top:0;"></h2>
        <div id="m-instr" style="background: #f0f0f0; padding: 15px; border-radius: 15px; margin-bottom: 20px; font-style: italic; color: #555;"></div>
        <div id="m-play" style="display:none;">
            <div id="m-content" style="font-size: 1.5em; margin-bottom: 20px; font-weight: bold;"></div>
            <div id="m-input-area"></div>
            <div id="m-feedback" style="margin-top:20px; font-weight:bold; min-height: 30px;"></div>
        </div>
        <div id="m-pre">
            <button class="btn-val" style="margin:0; width:100%;" onclick="comenzarReto()">¡EMPEZAR RETO!</button>
        </div>
        <button onclick="document.getElementById('game-overlay').style.display='none'" style="background:none; border:none; color:#999; text-decoration:underline; cursor:pointer; margin-top:20px;">Abandonar Modo</button>
    </div>
</div>

<script>
    const PGC = { 100:"Capital Social", 129:"Rtdo. Ejercicio", 210:"Terrenos", 216:"Mobiliario", 217:"Equipos Info", 300:"Mercaderías", 400:"Proveedores", 430:"Clientes", 472:"IVA Sop.", 477:"IVA Rep.", 572:"Bancos", 600:"Compras", 700:"Ventas", 628:"Suministros", 640:"Sueldos" };
    
    const MODOS = [
        { id: "balance", i: "⚖️", t: "Balance", h: "Suma el DEBE y calcula qué importe falta en el HABER para cuadrar." },
        { id: "pgc", i: "🎯", t: "Tiro PGC", h: "Escribe el código numérico de 3 dígitos de la cuenta indicada." },
        { id: "salto", i: "🏃", t: "Salto PGC", h: "Identifica la cuenta rápidamente por su código." },
        { id: "iva", i: "🔢", t: "Cero IVA", h: "Calcula el 21% de IVA de la base imponible mostrada." },
        { id: "memoria", i: "🧩", t: "Memoria", h: "Relaciona el nombre de la cuenta con su código oficial." },
        { id: "fuga", i: "🕳️", t: "Fuga", h: "Descubre el dígito que falta en el código de cuenta." },
        { id: "puzle", i: "🖼️", t: "Puzle", h: "Ordena los elementos de la cuenta contable." },
        { id: "auditor", i: "⚡", t: "Auditor", h: "Indica rápidamente si la cuenta es de ACTIVO (SÍ/NO)." },
        { id: "escalera", i: "🪜", t: "Escalera", h: "Responde correctamente para subir niveles de dificultad." },
        { id: "sopa", i: "🔍", t: "Sopa", h: "Busca el código correcto entre varias opciones." },
        { id: "examen", i: "🏆", t: "Examen", h: "Realiza el asiento contable completo de la operación." }
    ];

    let currentMode = "", currentAns = "", ejActual = null;

    function abrirTrimestre(n) {
        document.getElementById('selector-trimestres').style.display = 'none';
        document.getElementById('vista-juegos').style.display = 'block';
        document.getElementById('txt-trimestre').innerText = (n+1) + "º TRIMESTRE";
        const grid = document.getElementById('render-botones');
        grid.innerHTML = "";
        MODOS.forEach(m => {
            grid.innerHTML += `<button class="btn-j" onclick="configurarJuego('${m.id}')"><span>${m.i}</span><small>${m.t}</small></button>`;
        });
    }

    function configurarJuego(id) {
        currentMode = id;
        if(id === 'examen') {
            generarAsientoAleatorio();
        } else {
            const m = MODOS.find(x => x.id === id);
            document.getElementById('m-title').innerText = m.i + " " + m.t;
            document.getElementById('m-instr').innerText = m.h;
            document.getElementById('m-pre').style.display = "block";
            document.getElementById('m-play').style.display = "none";
            document.getElementById('game-overlay').style.display = "flex";
        }
    }

    function comenzarReto() {
        document.getElementById('m-pre').style.display = "none";
        document.getElementById('m-play').style.display = "block";
        generarNuevoMiniReto();
    }

    function generarNuevoMiniReto() {
        const cont = document.getElementById('m-content');
        const area = document.getElementById('m-input-area');
        document.getElementById('m-feedback').innerText = "";
        const keys = Object.keys(PGC);
        const rand = () => Math.floor(Math.random()*5000)+100;

        switch(currentMode) {
            case 'balance':
                let d1 = rand(), d2 = rand(); currentAns = d1 + d2;
                cont.innerHTML = `Debe: ${d1}€ y ${d2}€<br>¿Cuánto debe haber en el HABER?`;
                area.innerHTML = `<input type="number" id="m-ans" autofocus onkeydown="if(event.key==='Enter') validarMini(this.value)">`;
                break;
            case 'iva':
                let b = (Math.floor(Math.random()*40)+1)*10; currentAns = (b * 0.21).toFixed(1);
                cont.innerHTML = `Base Imponible: ${b}€<br>¿IVA Soportado (21%)?`;
                area.innerHTML = `<input type="number" step="0.1" id="m-ans" autofocus onkeydown="if(event.key==='Enter') validarMini(this.value)">`;
                break;
            case 'auditor':
                let k = keys[Math.floor(Math.random()*keys.length)]; currentAns = (k < 400 || k == 430 || k == 572) ? "V" : "F";
                cont.innerHTML = `¿"${k} - ${PGC[k]}" es de ACTIVO?`;
                area.innerHTML = `<button class="btn-val" onclick="validarMini('V')">SÍ</button><button class="btn-val" style="background:#999" onclick="validarMini('F')">NO</button>`;
                break;
            default:
                let kr = keys[Math.floor(Math.random()*keys.length)]; currentAns = kr;
                cont.innerHTML = `Código de la cuenta:<br>"${PGC[kr]}"`;
                area.innerHTML = `<input type="number" id="m-ans" autofocus onkeydown="if(event.key==='Enter') validarMini(this.value)">`;
        }
        setTimeout(() => { if(document.getElementById('m-ans')) document.getElementById('m-ans').focus(); }, 50);
    }

    function validarMini(val) {
        const fb = document.getElementById('m-feedback');
        if (parseFloat(val) == parseFloat(currentAns) || val.toString().toUpperCase() == currentAns) {
            fb.innerHTML = "<span style='color:green'>✔ ¡CORRECTO!</span>";
            setTimeout(generarNuevoMiniReto, 800);
        } else {
            fb.innerHTML = "<span style='color:red'>✘ Reinténtalo</span>";
        }
    }

    function generarAsientoAleatorio() {
        const ej = [
            {q:"COMPRA de Mercaderías por banco", cd:600, ch:572},
            {q:"VENTA de Mercaderías cobrada por banco", cd:572, ch:700},
            {q:"PAGO de factura de Electricidad (Suministros)", cd:628, ch:572},
            {q:"COBRO de un Cliente por banco", cd:572, ch:430},
            {q:"PAGO a un Proveedor por transferencia", cd:400, ch:572}
        ];
        let s = ej[Math.floor(Math.random()*ej.length)];
        let v = (Math.floor(Math.random()*20)+1)*100;
        ejActual = { cd:s.cd, ch:s.ch, v:v };
        document.getElementById('menu').style.display = 'none';
        document.getElementById('pantalla-juego').style.display = 'block';
        document.getElementById('quest').innerHTML = `<b>ENUNCIADO:</b><br>${s.q} por <b>${v}€</b>.`;
        document.getElementById('msg').style.display = 'none';
        clearInp();
    }

    function checkAsiento() {
        const m = document.getElementById('msg');
        const c1 = document.getElementById('cd').value, c2 = document.getElementById('ch').value;
        const v1 = document.getElementById('id').value, v2 = document.getElementById('ih').value;
        if(c1==ejActual.cd && c2==ejActual.ch && v1==ejActual.v && v2==ejActual.v) {
            m.innerText = "⭐ ¡CORRECTO! Cargando siguiente..."; m.style.color="green"; m.style.display="block";
            setTimeout(generarAsientoAleatorio, 1500);
        } else { m.innerText = "❌ Revisa códigos e importes."; m.style.color="red"; m.style.display="block"; }
    }

    function updateName(el, targetId) { document.getElementById(targetId).value = PGC[el.value] || ""; }
    function volverAInicio() { document.getElementById('selector-trimestres').style.display = 'grid'; document.getElementById('vista-juegos').style.display = 'none'; }
    function cerrarJuego() { document.getElementById('menu').style.display = 'block'; document.getElementById('pantalla-juego').style.display = 'none'; }
    function clearInp() { document.querySelectorAll('#pantalla-juego input').forEach(i => i.value = ""); }
</script>
</body>
</html>
