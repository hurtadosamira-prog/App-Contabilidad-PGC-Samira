<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>✨ ContaMaster ✨</title>
    <style>
        :root { --fucsia: #D47088; --rosa: #FFF0F5; --rojo: #FF4D4D; --verde: #2E7D32; }
        
        body { font-family: 'Segoe UI', sans-serif; background: #F5F5F5; margin: 0; padding: 40px; color: #333; font-size: 20px; }
        .container { max-width: 1400px; margin: auto; }
        
        #menu { display: block; text-align: center; }
        
        /* Vista inicial: 4 Trimestres únicamente */
        .tri-selector { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 40px; 
            margin-top: 50px; 
        }

        .btn-trimestre {
            background: #FFF;
            border: 4px solid var(--fucsia);
            border-radius: 40px;
            padding: 80px 20px;
            font-size: 2.5em;
            font-weight: bold;
            color: var(--fucsia);
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .btn-trimestre:hover {
            background: var(--fucsia);
            color: #FFF;
            transform: translateY(-10px);
        }

        /* Contenedor de Minijuegos (Oculto por defecto) */
        #vista-juegos { display: none; }
        
        .card { background: #FFF; border: 3px solid #EEE; border-radius: 30px; padding: 25px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); margin-top: 20px; }
        .titulo-seccion { color: var(--fucsia); font-weight: bold; text-align: left; border-left: 8px solid var(--fucsia); padding-left: 15px; margin-bottom: 25px; font-size: 1.8em; display: flex; justify-content: space-between; align-items: center; }
        
        .grid-btns { display: grid; grid-template-columns: repeat(6, 1fr); gap: 15px; }
        .btn-j { background: #FFF; border: 2px solid #DDD; border-radius: 18px; padding: 25px 5px; cursor: pointer; transition: 0.2s; display: flex; flex-direction: column; align-items: center; }
        .btn-j:hover { background: var(--rosa); border-color: var(--fucsia); transform: scale(1.05); }
        .btn-j span { font-size: 2.5em; }
        .btn-j small { font-size: 0.8em; font-weight: bold; color: #777; margin-top: 10px; }

        /* Pantalla de Juego Activo */
        #pantalla-juego { display: none; background: #FFF; padding: 40px; border-radius: 40px; border: 5px solid var(--fucsia); box-shadow: 0 25px 60px rgba(0,0,0,0.1); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .btn-esc { background: var(--rojo); color: #FFF; border: none; padding: 15px 35px; border-radius: 15px; font-weight: bold; cursor: pointer; font-size: 20px; }
        
        .box { background: var(--rosa); padding: 30px; border-radius: 25px; margin-bottom: 30px; font-size: 1.5em; font-weight: bold; position: relative; }
        .hint-btn { position: absolute; top: 15px; right: 20px; font-size: 2em; cursor: pointer; background: none; border: none; }

        .row { display: grid; grid-template-columns: 140px 1fr 200px; gap: 20px; margin-bottom: 15px; width: 100%; max-width: 900px; margin: auto; }
        input { padding: 20px; border: 3px solid #DDD; border-radius: 15px; text-align: center; font-size: 22px; }
        input:focus { border-color: var(--fucsia); outline: none; box-shadow: 0 0 10px rgba(212, 112, 136, 0.2); }
        .cta-name { background: #F5F5F5; border: none; color: var(--fucsia); font-weight: bold; text-align: left; padding-left: 20px; font-size: 22px; }
        
        .btn-val { background: var(--fucsia); color: #FFF; width: 100%; max-width: 900px; padding: 25px; border-radius: 20px; font-size: 1.6em; border: none; font-weight: bold; cursor: pointer; display: block; margin: 40px auto; }
        #msg { margin-top: 25px; padding: 20px; border-radius: 20px; text-align: center; display: none; font-weight: bold; font-size: 22px; }

        /* Estilos extras para botones de minijuegos */
        .btn-check { background: var(--fucsia); color: white; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div id="menu">
        <h1 style="color: var(--fucsia); font-size: 3.5em; margin-bottom: 10px; text-align: center;">✨ ContaMaster ✨</h1>
        
        <div id="selector-trimestres" class="tri-selector">
            <button class="btn-trimestre" onclick="abrirTrimestre(0)">1º TRIMESTRE</button>
            <button class="btn-trimestre" onclick="abrirTrimestre(1)">2º TRIMESTRE</button>
            <button class="btn-trimestre" onclick="abrirTrimestre(2)">3º TRIMESTRE</button>
            <button class="btn-trimestre" onclick="abrirTrimestre(3)">4º TRIMESTRE</button>
        </div>

        <div id="vista-juegos">
            <div class="card">
                <div class="titulo-seccion">
                    <span id="txt-trimestre">TRIMESTRE</span>
                    <button class="btn-esc" style="background: #999;" onclick="volverAInicio()">ATRÁS</button>
                </div>
                <div class="grid-btns" id="render-botones"></div>
            </div>
        </div>
    </div>

    <div id="pantalla-juego">
        <div class="header">
            <button class="btn-esc" onclick="cerrarJuego()">✖️ SALIR</button>
            <div id="game-title" style="font-weight:bold; color:var(--fucsia); font-size: 1.6em;">MODO</div>
            <div id="timer" style="font-weight:bold; font-size: 2.5em; color: var(--fucsia);">00:00</div>
        </div>
        <div class="box">
            <button class="hint-btn" onclick="verPista()">💡</button>
            <div id="quest"></div>
        </div>
        <div id="area">
            <div class="row">
                <input type="number" id="cd" placeholder="Código" onkeydown="enterCta(event, 'nd', 'id')">
                <input type="text" id="nd" class="cta-name" readonly placeholder="Cuenta...">
                <input type="number" id="id" placeholder="€ Debe">
            </div>
            <div style="text-align:center; font-weight:bold; color:var(--fucsia); margin:15px; font-size: 1.5em;">A</div>
            <div class="row">
                <input type="number" id="ch" placeholder="Código" onkeydown="enterCta(event, 'nh', 'ih')">
                <input type="text" id="nh" class="cta-name" readonly placeholder="Cuenta...">
                <input type="number" id="ih" placeholder="€ Haber">
            </div>
            <button class="btn-val" onclick="check()">🚀 VALIDAR</button>
        </div>
        <div id="msg"></div>
    </div>
</div>

<div id="game-overlay" style="display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; color: white;">
    <div style="background: white; color: #333; padding: 25px; border-radius: 15px; width: 90%; max-width: 400px; text-align: center;">
        <h2 id="mini-g-title" style="color: var(--fucsia)"></h2>
        <div id="mini-g-content" style="font-size: 1.2em; margin-bottom: 15px;"></div>
        <div id="mini-feedback" style="margin: 15px 0; font-weight: bold; min-height: 25px;"></div>
        <button onclick="document.getElementById('game-overlay').style.display='none'" style="background: #e74c3c; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer;">CERRAR</button>
    </div>
</div>

<script>
    const PGC = { 100:"Capital Social", 129:"Rtdo. Ejercicio", 210:"Terrenos", 216:"Mobiliario", 217:"Equipos Info", 300:"Mercaderías", 400:"Proveedores", 430:"Clientes", 472:"IVA Sop.", 477:"IVA Rep.", 572:"Bancos", 600:"Compras", 700:"Ventas", 628:"Suministros", 640:"Sueldos" };

    const MODOS = [
        { id: "balance", i: "⚖️", t: "Balance Pesas", p: "Suma Debe = Suma Haber." },
        { id: "pgc", i: "🎯", t: "Tiro al Error", p: "Revisa el código PGC." },
        { id: "salto", i: "🏃", t: "Salto PGC", p: "Grupo 2 = Inmovilizado." },
        { id: "iva", i: "🔢", t: "Cero Izq.", p: "Base x 0.21 = IVA." },
        { id: "memoria", i: "🧩", t: "Memoria Act.", p: "472 es Soportado." },
        { id: "fuga", i: "🕳️", t: "Fuga Capital", p: "Revisa gastos bancarios." },
        { id: "puzle", i: "🖼️", t: "Puzle Fact.", p: "Total = Base + Cuota." },
        { id: "auditor", i: "⚡", t: "Auditor Veloz", p: "Activo=Bienes, Pasivo=Deudas." },
        { id: "escalera", i: "🪜", t: "Escalera", p: "Regulariza antes de cerrar." },
        { id: "sopa", i: "🔍", t: "Sopa Cuentas", p: "Busca 'Bancos'." },
        { id: "examen", i: "🏆", t: "Examen Final", p: "Repasa todo el trimestre." }
    ];

    let db = [];
    for(let t=1; t<=4; t++) {
        MODOS.forEach((m, i) => {
            db.push({
                id: m.id,
                titulo: m.t,
                icono: m.i,
                pista: m.p,
                enunciado: `[T${t} - Juego ${i+1}] Realiza el asiento: Operación de ${100*(i+1)}€ + 21% IVA por banco.`,
                cd: 600, ch: 572, id_val: 100*(i+1), ih_val: (100*(i+1))*1.21
            });
        });
    }

    let crono, seg = 0, ejActual = null, triActualIdx = 0;
    let currentMiniAnswer = "";

    function abrirTrimestre(tIdx) {
        triActualIdx = tIdx;
        document.getElementById('selector-trimestres').style.display = 'none';
        document.getElementById('vista-juegos').style.display = 'block';
        document.getElementById('txt-trimestre').innerText = (tIdx + 1) + "º TRIMESTRE";
        
        const r = document.getElementById('render-botones');
        r.innerHTML = "";
        for(let j=0; j<11; j++) {
            let idx = (tIdx*11)+j;
            r.innerHTML += `<button class="btn-j" onclick="lanzarJuego(${idx})"><span>${db[idx].icono}</span><small>${db[idx].titulo}</small></button>`;
        }
    }

    function lanzarJuego(idx) {
        const juego = db[idx];
        // El examen final siempre abre la pantalla de asientos
        if(juego.id === 'examen') {
            comenzarJuegoAsiento(idx);
        } else {
            launchMini(juego.id);
        }
    }

    function volverAInicio() {
        document.getElementById('selector-trimestres').style.display = 'grid';
        document.getElementById('vista-juegos').style.display = 'none';
    }

    // LÓGICA MINIJUEGOS RÁPIDOS
    function launchMini(gameId) {
        const overlay = document.getElementById('game-overlay');
        const content = document.getElementById('mini-g-content');
        const feedback = document.getElementById('mini-feedback');
        const title = document.getElementById('mini-g-title');
        
        overlay.style.display = 'flex';
        feedback.innerText = "";
        content.innerHTML = "";
        
        switch(gameId) {
            case 'balance':
                title.innerText = "Balance de Pesas";
                let debe = Math.floor(Math.random() * 5000) + 1000;
                currentMiniAnswer = debe;
                content.innerHTML = `<p>Debe: <b>${debe}€</b></p><p>¿Cuánto falta en el Haber?</p>
                                    <input type="number" id="mini-ans" style="width:150px">
                                    <button class="btn-check" onclick="checkMini(document.getElementById('mini-ans').value)">CUADRAR</button>`;
                break;
            case 'iva':
                title.innerText = "Cero a la Izquierda";
                let base = [100, 200, 500, 1000][Math.floor(Math.random()*4)];
                currentMiniAnswer = base * 0.21;
                content.innerHTML = `<p>Base: <b>${base}€</b></p><p>Calcula el 21% de IVA:</p>
                                    <input type="number" id="mini-ans" style="width:150px">
                                    <button class="btn-check" onclick="checkMini(document.getElementById('mini-ans').value)">CALCULAR</button>`;
                break;
            case 'pgc':
                title.innerText = "Tiro al Error";
                content.innerHTML = `<p>¿Grupo de la cuenta <b>(572) Bancos</b>?</p>
                                    <button class="btn-check" onclick="checkMini(1)">G1</button> 
                                    <button class="btn-check" onclick="checkMini(5)">G5</button>`;
                currentMiniAnswer = 5;
                break;
            case 'auditor':
                title.innerText = "Auditor Veloz";
                content.innerHTML = `<p>¿<b>Clientes (430)</b> es...?</p>
                                    <button class="btn-check" onclick="checkMini('A')">ACTIVO</button> 
                                    <button class="btn-check" onclick="checkMini('P')">PASIVO</button>`;
                currentMiniAnswer = "A";
                break;
            default:
                content.innerHTML = "<p>¡Próximamente más niveles de este modo!</p>";
        }
    }

    function checkMini(val) {
        const fb = document.getElementById('mini-feedback');
        if (val == currentMiniAnswer) {
            fb.innerHTML = "<span style='color:green'>¡CORRECTO! 🌟</span>";
            setTimeout(() => { document.getElementById('game-overlay').style.display = 'none'; }, 1000);
        } else {
            fb.innerHTML = "<span style='color:red'>Error. Intenta de nuevo.</span>";
        }
    }

    // LÓGICA ASIENTOS (EXAMEN)
    function comenzarJuegoAsiento(idx) {
        ejActual = db[idx];
        document.getElementById('menu').style.display = 'none';
        document.getElementById('pantalla-juego').style.display = 'block';
        document.getElementById('game-title').innerText = ejActual.titulo;
        document.getElementById('quest').innerText = ejActual.enunciado;
        document.getElementById('msg').style.display = 'none';
        clearInp();
        startT();
    }

    function cerrarJuego() { 
        clearInterval(crono); 
        document.getElementById('menu').style.display = 'block'; 
        document.getElementById('pantalla-juego').style.display = 'none'; 
        abrirTrimestre(triActualIdx); 
    }

    function enterCta(e, label, next) {
        if (e.key === 'Enter') {
            const v = e.target.value;
            if (PGC[v]) {
                document.getElementById(label).value = PGC[v];
                document.getElementById(next).focus();
            }
        }
    }

    function check() {
        const m = document.getElementById('msg');
        const cd = parseInt(document.getElementById('cd').value);
        const ch = parseInt(document.getElementById('ch').value);
        const id_val = parseFloat(document.getElementById('id').value);
        const ih_val = parseFloat(document.getElementById('ih').value);

        if(cd === ejActual.cd && ch === ejActual.ch && id_val === ejActual.id_val && ih_val === ejActual.ih_val) {
            m.innerText = "⭐ ¡CORRECTO! Dominas el " + ejActual.titulo;
            m.style.background = "#E8F5E9"; m.style.color = "#2E7D32";
        } else {
            m.innerText = "❌ ERROR: Revisa cuentas o importes.";
            m.style.background = "#FFEBEE"; m.style.color = "#C62828";
        }
        m.style.display = "block";
    }

    function verPista() { alert("💡 PISTA: " + ejActual.pista); }
    function startT() { seg = 0; clearInterval(crono); crono = setInterval(() => { seg++; let min = Math.floor(seg/60), s = seg%60; document.getElementById('timer').innerText = `${min.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`; }, 1000); }
    function clearInp() { document.querySelectorAll('#pantalla-juego input').forEach(i => i.value = ""); document.getElementById('nd').value=""; document.getElementById('nh').value=""; }
</script>
</body>
</html>
