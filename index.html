<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ContaMaster ✨ 10 Minijuegos</title>
    <style>
        :root {
            --fucsia: #D47088;
            --rosa-palo: #FFF0F5;
            --rojo: #FF4D4D;
            --verde: #2E7D32;
            --oro: #FFD700;
        }

        body { font-family: 'Segoe UI', sans-serif; background: #FFFFFF; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: auto; }

        /* --- MENÚ --- */
        #menu-principal { display: block; text-align: center; }
        .tri-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(480px, 1fr)); gap: 20px; margin-top: 20px; }
        .trimestre-card { background: #fff; border: 2px solid var(--rosa-palo); border-radius: 25px; padding: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .tri-titulo { color: var(--fucsia); font-weight: bold; margin-bottom: 15px; display: block; border-left: 5px solid var(--fucsia); padding-left: 10px; text-align: left; }
        
        .grid-botones { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
        .btn-juego { background: white; border: 1px solid #ddd; border-radius: 15px; padding: 12px 2px; cursor: pointer; transition: 0.2s; }
        .btn-juego:hover { background: var(--rosa-palo); transform: translateY(-3px); border-color: var(--fucsia); }
        .btn-juego span { display: block; font-size: 1.6em; }
        .btn-juego small { font-size: 0.65em; color: #777; display: block; margin-top: 4px; line-height: 1.1; }

        /* --- PANTALLA JUEGO --- */
        #pantalla-juego { display: none; background: white; padding: 30px; border-radius: 30px; border: 3px solid var(--fucsia); box-shadow: 0 20px 50px rgba(0,0,0,0.1); position: relative; }
        .header-juego { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .btn-salir { background: var(--rojo); color: white; border: none; padding: 12px 25px; border-radius: 12px; font-weight: bold; cursor: pointer; }
        
        .supuesto-box { background: var(--rosa-palo); padding: 25px; border-radius: 20px; margin-bottom: 25px; font-size: 1.3em; font-weight: bold; position: relative; }
        .btn-bombilla { position: absolute; top: 10px; right: 10px; font-size: 1.8em; cursor: pointer; background: none; border: none; }

        /* --- ÁREA DE JUEGO DINÁMICA --- */
        #zona-minijuego { min-height: 300px; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 2px dashed #eee; border-radius: 20px; padding: 20px; }
        
        /* Estilo para los inputs de asiento tradicionales (usados en varios juegos) */
        .asiento-ui { width: 100%; max-width: 600px; }
        .asiento-row { display: grid; grid-template-columns: 100px 1fr 140px; gap: 10px; margin-bottom: 10px; }
        input { padding: 12px; border: 2px solid #ddd; border-radius: 10px; text-align: center; }
        .nombre-cta { background: #f4f4f4; border: none; color: var(--fucsia); font-weight: bold; text-align: left; padding-left: 10px; }

        #mensaje { margin-top: 20px; padding: 15px; border-radius: 15px; text-align: center; display: none; font-weight: bold; width: 100%; }
    </style>
</head>
<body>

<div class="container">
    <div id="menu-principal">
        <h1 style="color: var(--fucsia); font-size: 2.5em;">🌸 CONTAMASTER: EL DESAFÍO</h1>
        <p style="color: #888;">Domina la contabilidad con los 10 minijuegos seleccionables</p>
        <div class="tri-grid" id="render-menu"></div>
    </div>

    <div id="pantalla-juego">
        <div class="header-juego">
            <button class="btn-salir" onclick="volverMenu()">✖️ SALIR AL MENÚ</button>
            <div id="titulo-minijuego" style="font-weight:bold; color:var(--fucsia); font-size:1.2em;"></div>
            <div id="reloj" style="font-weight:bold; font-size:1.8em; color: var(--fucsia);">00:00</div>
        </div>
        
        <div class="supuesto-box">
            <button class="btn-bombilla" onclick="darPista()">💡</button>
            <div id="enunciado"></div>
        </div>

        <div id="zona-minijuego">
            </div>

        <div id="mensaje"></div>
    </div>
</div>

<script>
    const PGC = { 100:"Capital Social", 210:"Terrenos", 216:"Mobiliario", 300:"Mercaderías", 400:"Proveedores", 430:"Clientes", 472:"IVA Sop.", 477:"IVA Rep.", 572:"Bancos", 600:"Compras", 700:"Ventas" };

    const MINIJUEGOS = [
        { span: "⚖️", titulo: "Balance de Pesas", desc: "Cuadra en <10s", pista: "Suma Debe = Suma Haber" },
        { span: "🎯", titulo: "Tiro al Error", desc: "Pulsa la cta. incorrecta", pista: "Cuidado con los grupos del PGC" },
        { span: "🏃", titulo: "Salto del PGC", desc: "Solo Grupo 2", pista: "Grupo 2 = Inmovilizado" },
        { span: "🔢", titulo: "Cero a la Izquierda", desc: "Decimales en factura", pista: "Multiplica Base x 0,21" },
        { span: "🧩", titulo: "Memoria Activa", desc: "Empareja códigos", pista: "472 es Soportado, 477 Repercutido" },
        { span: "🕳️", titulo: "Fuga de Capitales", desc: "Tapa agujeros de gastos", pista: "Registra antes de que el saldo baje" },
        { span: "🖼️", titulo: "Puzle de Factura", desc: "Une piezas rotas", pista: "Busca el total de la factura" },
        { span: "⚡", titulo: "Auditor Veloz", desc: "Activo/Pasivo/Neto", pista: "Cuentas de 'tener' son Activo" },
        { span: "🪜", titulo: "Escalera de Cierre", desc: "Ordena los 7 pasos", pista: "Primero Amortiza, último Resultado" },
        { span: "🔍", titulo: "Sopa de Cuentas", desc: "Encuentra nombres", pista: "Busca palabras como 'Bancos'" }
    ];

    let timer, seg = 0, juegoActual = null;

    function renderMenu() {
        const grid = document.getElementById('render-menu');
        for(let t=1; t<=4; t++) {
            let html = `<div class="trimestre-card"><span class="tri-titulo">${t}º TRIMESTRE</span><div class="grid-botones">`;
            MINIJUEGOS.forEach((m, i) => {
                html += `<button class="btn-juego" onclick="lanzarJuego(${i})">
                            <span>${m.span}</span>
                            <small>${m.titulo}</small>
                         </button>`;
            });
            html += `</div></div>`;
            grid.innerHTML += html;
        }
    }

    function lanzarJuego(id) {
        juegoActual = MINIJUEGOS[id];
        document.getElementById('menu-principal').style.display = 'none';
        document.getElementById('pantalla-juego').style.display = 'block';
        document.getElementById('titulo-minijuego').innerText = juegoActual.titulo;
        document.getElementById('enunciado').innerText = "Objetivo: " + juegoActual.desc;
        document.getElementById('mensaje').style.display = 'none';
        
        cargarInterfaz(id);
        iniciarReloj();
    }

    function cargarInterfaz(id) {
        const zona = document.getElementById('zona-minijuego');
        zona.innerHTML = ""; // Limpiar
        
        // Estructura base para juegos que usan asientos (ej. Balance de Pesas)
        if(id === 0 || id === 3 || id === 6) {
            zona.innerHTML = `
                <div class="asiento-ui">
                    <div class="asiento-row">
                        <input type="number" id="c-debe" placeholder="PGC" onkeydown="handleEnter(event, 'debe')">
                        <input type="text" id="n-debe" class="nombre-cta" readonly placeholder="Cuenta">
                        <input type="number" id="i-debe" placeholder="€ Debe">
                    </div>
                    <div style="text-align:center; font-weight:bold; color:var(--fucsia); margin:10px;">A</div>
                    <div class="asiento-row">
                        <input type="number" id="c-haber" placeholder="PGC" onkeydown="handleEnter(event, 'haber')">
                        <input type="text" id="n-haber" class="nombre-cta" readonly placeholder="Cuenta">
                        <input type="number" id="i-haber" placeholder="€ Haber">
                    </div>
                    <button class="btn-validar" onclick="validarGenerico()">✅ COMPROBAR</button>
                </div>`;
        } else {
            zona.innerHTML = `<div style="text-align:center; color:#999;">🎮 Mini-motor de "${juegoActual.titulo}" cargando...<br><br>Prepárate para el reto visual.</div>`;
        }
    }

    function handleEnter(e, tipo) {
        if (e.key === 'Enter') {
            const cod = e.target.value;
            if (PGC[cod]) {
                document.getElementById('n-' + tipo).value = PGC[cod];
                document.getElementById('i-' + tipo).focus();
            }
        }
    }

    function volverMenu() {
        clearInterval(timer);
        document.getElementById('menu-principal').style.display = 'block';
        document.getElementById('pantalla-juego').style.display = 'none';
    }

    function darPista() { alert("💡 PISTA: " + juegoActual.pista); }

    function iniciarReloj() {
        seg = 0; clearInterval(timer);
        timer = setInterval(() => {
            seg++;
            let m = Math.floor(seg/60), s = seg%60;
            document.getElementById('reloj').innerText = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
        }, 1000);
    }

    function validarGenerico() {
        const m = document.getElementById('mensaje');
        m.innerText = "⭐ ¡Logrado! Sigue entrenando para el 10.";
        m.style.display = "block";
        m.style.background = "#E8F5E9"; m.style.color = var(--verde);
    }

    renderMenu();
</script>
</body>
</html>
